body:
  text: 勝鬘經述記目次卷之上如來真實功德章第一十受章第二三願章第三攝受章第四一乘章第五卷之下一乘章之餘無邊聖諦章第六如來藏章第七法身章第八空義隱覆真實章第九一諦章第十一依章第十一顛倒真實章第十二自性清淨章第十三如來真子章第十四勝鬘獅子吼章第十五勝鬘經述記目次終
