body:
  text: 大乘慈恩基法師説門人義令記此經有三分初説經由致分二如來妙色身以下加持廣説分三爾時世尊放勝光明等下還述依行分前中有二初諸經通敘二時波斯匿王下此經別敘通敘中若依大智度論有六一謂如是二謂我聞三時四佛五處六衆明文若依佛地論有五如是我聞總合為一為令生信何以然者若説如是即我聞別者既説我聞欲聞何法以即前是別故今總為一今言如是前法我從佛聞合一為勝問此言佛住乃至餘經復言佛在耶答在者遊化之處住者遊化所居古釋有多非關三住等義也問佛地有五何故此經獨無教所被機耶答勝鬘長為國后生在深宮出入既難折法至重如來愍其聰慧為現空中居將每逐衆人恐招議論於空挺住復釋譏嫌所以此經無通敘衆勝鬘眷屬即教被機創聽深經非常隨也如來獨往所以無常應隨衆既在孤獨園中豈是勝鬘説經之處耶解云不舉説經之處但談付屬之所也問付屬之所尚列為處所何不標付屬之衆作同聞之人解云付屬之衆非是所為故此不列付屬之處佛意故偏釋又解此經亦有同聞衆故下經云天龍八部等但是經家隱前顯後若列在初者恐時人謂給園衆生同聞勝鬘所説此經隱前顯後者耆闍雖無祗洹衆有為成二家別故有隱顯也於別敘中有四初平章遣信二勝鬘得書以下勝鬘喜請三即生此念時等佛現在空四勝鬘及眷屬下接歎歸禮前中有二初談平章因二明遣使果言波斯匿王者此謬也應言鉢羅犀那恃此云勝軍也其仁王經云波斯匿王是月光王也今三藏會云有二種王名此人非故十六群童子為義言末利夫人者本非正妃未得為三夫人列故末利人也以能有扶夫之用名曰夫人也二云末利者薗名從因地受稱名末利夫人也應云末利迦此云造鬘者此女先是摩訶男家守園賤士因施佛飯奉願隨身當為國母因即現報每以衆綖貫華名造鬘者問何故古名塵頭婢耶答抄筆者誤然三藏意説此以造華鬘串於頭上為此方不解故置華於頭上欲莊末利名造鬘者此方不悟遂疑己心名塵頭婢儻置餘華應名衆色頭婢耶言信法未久者為夫搶歸佛法其信未堅然婢雖久淨心隨夫總言未久此談平章之因也若言未久如何能難如來三德耶應云信法未久書寫家錯故第二明遣使果正辨平章中有四初歎女德高二夫人敬諾三作書遣信四使者依行於歎女德中有五初泛示平章二明女字三恰受四歎女德高五正明籌議言共相謂言者泛示也問曰兩人相對言論談道可説共相下獨夫人敬諾唯王語何得稱共相謂言耶答曰四解二情和順故名為共夫獨申語曰謂言所以下文夫人敬諾也又可兩面相覿無反曰共王出言告稱曰謂言夫人面難相對上文由是未語情無違背下文所以言又可其王發語夫人許諾操云如是即謂共相非夫人先發下獨稱敬諾也又云欲明父母俱解常住共宜重欲及女同得此解故言共相謂也言勝鬘者二明字也梵音云末利室羅此云勝鬘有三義一云夫人種因久遠行果令生聰慧利根堪聞妙法灌勝法在心是鬘者之女故名勝鬘二云然末利産生既多上有琉璃太子能除釋種下有金剛女門亦不逾中有勝鬘形貌端政才量難思復為用妃末利深生敬重是夫人愛勝之女鬘過勝故名曰勝鬘三云其母初為賤餘後始高尊然女終始俱珍過母母邊勝故名曰勝鬘也問既標勝之足何須復道夫人耶解云子尊不加於父雖為國后然是女所以先標鬘為與貴重人作軌則復置夫人之德若稱正名便違他國法也是我之女者三恰念也彰己語知也言夫人足知是女何須重言是我之女耶二解如前作書為別餘女故二云本來解常之時生死之女今已解常名真女故須重也言聰慧等下四歎德也於中有二初聰至悟者生知之德二從若至無疑長益之能亦可初在凡之德後居聖之德又可初有漏之德後無漏之德茲出性天然如寶在自潔非不成其器要見佛而無疑於生知之德中有二義為六或可為三言六者一聰聞法即悟不假裁節故二慧簡擇是非故三利根速證真理故四通事理無擁故五愍明而不亂故六易悟聞能速解故也云三者上三是標下三是釋通故聰簡故通也敏故慧疏略之慧易悟故利根簡諸外道故此出性天然名生知德也言若見佛者至心得無疑者述曰明長益之能有四解由逢佛故必速解法修善也心得無疑離惡也惑有見修障聖唯見見中萬品疑是為先今所以獨疑也二云以遇佛故得正理證必速解法也大智能生心得無疑三云善謂二種性得方便方便中有三謂聞思修故由近善知識有聞思二慧起即若見佛者必速解法也因二得定修慧便生簡擇諸法謂心得無疑也四云勝鬘四諦具證名為速解法也四種淨在身魔不能滅謂心得無疑也言宜時遣信發其道意者述曰第五正辨籌議也心信堪可故説名宜今正應爾故名曰時上人慰下稱遣今傳意到曰信信至大願遂生行因故菩提乃尅所以名為發其道意也言夫人白言今正是時者述曰夫人敬諾也聞法是時宜應速往也言王及夫人等者述曰第三作書遣信於中有二初作書第二遣信言王及夫人至無量功德者作書也言與勝鬘書至讚彰能歎也如來以下明其所歎功德無量不可具陳今少稱揚故名略讚乘如實道名曰如來內德無窮稱為無量行因所得乃以功德為名問父母愛女情重義言天隔何不噯女來聽合彼儼思何得菴含略讚功德耶答不得有二種過若噯女來聽夫所制物若合遙念恐生我慢但可略示尊名任自安念也言即遣內人名旃提羅者述曰第二遣信也旃提羅者古釋使人名故今解不爾此名聲類有三種名戰陀羅月也旃陀羅屠兒也今旃提羅者黃門兒也總談其德非獨使人之名也言使人奉書至敬授勝鬘者述曰第四使者依行言阿踰闍國者此云無生國以此國中多學大乘無生觀故從學為名也此王名右稱王故尊信既重不可守門以是內人今直入其宮內必為下隸所以須護於勝鬘故名為敬前跪申手付書了彼稱為授也上為第一平章遣信也言勝鬘得書以下第二勝鬘喜請於中有二初明喜二明請前喜中有二初得書歡喜二向旃提羅等下敬讚歡喜問勝鬘得書何利作此歡喜耶答有三解一云見送書人異於常徒表此書中必有勝事也二云書有二種謂吉凶故向觀此人形顏貌怡悅定非凶事也三云勝鬘大士隱迹女人欲化此國之人無由及今得書已近適侶情遠合化道衆生根熟正堪聞法所以歡喜言我聞佛音等者述曰第二喜也問勝鬘先未見佛但覩其書只可眼見如何得聞耶答有五説一云論實讀書應名眼見聽彼者言述依此名聞二云無辟林解云勝鬘讀書非是耳聽今將眼讚耳故名我聞此解不可三云若論語表獨在於聲紙載其文色非表業今見色文而起解若覩相而思仁鑒果意念其因因故實為聞也四云口讀於書耳聞昔名聞也五云勝鬘得書意父母作書意令勝鬘讚書請佛今既得已即請如似我身於父母前坐聞相似名聞故也問此我聞一頌異説何耶答有二意一云恭敬使人此意云今我得書聞佛名譽世所無此實生希有汝今所欲如來實實如言者我今抑汝劬勞之甚故曰應當修供養也二云供養如來非使人故此意云我聞如來功德好音所言若真我今應當具以三業修持供養如來也此是旁義故無辟林云使人汝言若真與汝作衣裳問上文云勝鬘具聽聰慧利根一聞領悟無所凝滯下文復説我久安立汝前世已開覺等如來非使人乃是有疑如何説聰耶答有二解一云前後二文實為聰敏但聞即悟無有疑心今此示相生疑欲令事事皆審喻如復若如來知而故問也二云此中實生其惑何故前文説聽等耶有二種義前約生知之德天性所以言聽後據長益之能愴實生於心或功德勝故由是生疑言仰惟佛世尊等一行明請也問曰仰惟伏惟此二何別耶答深心任念名曰伏惟佛德既高慕遵曰仰言普為世間出者普有二義謂遍故並故遍故無所不遊並哉若日輝於東域普照天下喻大智也言即生此念時等一行第三勝鬘默説現於空王言不得輒爾不將常隨之衆入宮恐招議論如來所以在空放光故智德圓現身故斷德立又可上恩德利他具下斷德是自利又可放光故令滅諸纏現身故令修萬行也二云地是有空是無如來在空者明佛體有相生空故空也三云世間處空必離去地表如來脫三相離生死地也言勝鬘及眷屬等一行第四接歎歸禮接故身業也心故意業也歎故語業也問夫言接足親捧尊容佛既住空如何接足耶答有二種一身親一身接二意親名接今勝鬘相對尊容意立名接也下説一章下正説分言如來妙色身等以下第二加持廣説分於中十五章經分之為二謂自利利他行前十四名自利第十五名利他利他即自利一無別何者修智惑滅名曰自利説授他學名曰利他利他若成攝歸即是自利故言為一前自利中有二初十三明法第十四辨人人無別體攬實以成人故前為法十四為人也依攝論瑜伽有三義一處二修行三修行者攝論云十殊勝者前二為境今是處也中六為行乃修行也後二為果即是修行之者今十章中既見法身真境生滅之塵二境共圓名境處也前十四章修其萬行第十五章名修行者其人是也前法中有四謂教理行果初有四章名行第五一章明果後有八章總為教理問何以不次第耶答教理前世開覺所以後明行果曾來示修今時無説於中有二初有二章明行修二章明願行中有二謂有漏無漏或有世間出世間或有自利利他願也於真實章中有四初六行頌讚歎如來二有一行頌佛許攝受三有一行頌及少長行勝鬘歡喜設禮處恭四佛於衆生下見殷勤為其授記於六行中有二初五行歎佛次有一行發心求攝於前中有二初四行別歎三事總歎涅槃次有一行總歎衆德別歎福智於前中有三初二行歎法身次有一行歎解脫次有一行歎摩訶般若歎法身中即是三身佛也問涅槃所説三事唯是法身此處及成唯識三身為法身耶答涅槃據如一體義説三名此處成唯識約事三説若二乘位名解脫身在大牟尼名法身故體依聚義説為身然諸論中説智及處俱名為般若菩提菩提斷俱名為菩提攝論又云二斷二智為菩提故故此三身並名法身也於二偈明三身中初一行明化身次兩句明報身次後二句明法身故云妙色身者四事既不可唯變相色色雖本影有別不失其位有用心法若通影本相心為境無用所以唯化為色此中獨歎也言世間無與等者有三義無等齊德無比者無類德不思議者無言慮德故釋迦如來因中歎燃燈佛云天地此界多聞室逝宮天處十方無丈夫中王大沙門尋地山林遍無等言如來色無盡智慧亦復然者歎自受用身一切法有二色聚非色聚色聚舉色為首非色以智為先以佛果中智慧強故故涅槃捨無常色獲得常色受想行識亦復如是也言一切法常住者歎法身也一切有二謂一切一切少分一切也若一切一切如來所知是佛境名一切法也常住所謂真如真如與彼為依即是一切法之常住故我歸依也若少分一切謂如來地恆沙功德唯無漏唯無為唯善性一切法與常住故我依歸佛故此三身有三種常法爾凝然常不變易故報身不斷常一受已去更不斷故變化身相續常隨機應物故言降伏心過惡等一行明解脫也降者下義令煩惱卑下伏者歸義令相應淨故名降伏也然起煩惱由二種境一謂色二謂心心為因故諸煩惱起名心過惡色為境故積聚名身四大種故曰及與身四種也第二解云起諸煩惱由三業故言心過惡意業也及與身身三邪言四種語四過也譯者意存省略若有應言降伏心三語四及身三種過惡應在其下今此語業標有四應教身心各具三種過惡既居心下彰身與語只有此名三云心過惡者無明住地身四種者餘四住地今意身者已此依身起謂所依得名也煩惱在身為他所伏罪惑皆盡故名難伏地地者謂無明住地為難伏佛地方斷故二者即指如來言知一切爾炎等者一行明摩訶般若言爾炎者此翻為境亦名智母以能生智故此境名後得智一切種智也智慧身自在者謂根本智昔由煩惱所拘不得自在永離罪染解脫無為名為自在觀空之智也言身者通釋二智依止名身故攝謂包含一切境界全分俱盡真俗具收是佛所知後得智也持謂任持不令流散持一切法者少分非多是根本智能證真理任持少分一切法界之理名持一切法由是我等今敬禮言敬禮過稱量等一行總歎衆德別歎福慧也然有四種一謂數分若依俱舍有六十大數四已遺落有五十六名阿僧祗劫若依華嚴經一百二十大數至億數已乃加億億名非等也二謂喻分乃以世間法為譬三時分謂有四時分故四力分所不能伏故今此頌中依此四種言過稱量者過數分也稱謂能計量謂所度名曰稱量也言無譬類者過喻分也如王勢力尚自無礙況有如來喻所能譬也言無邊法者過時分也言難思議者過力分也尋思所不及言論不能知世所難伏名過力分也又有解者此一行釋疑疑曰見上歎佛意謂如來功德有所歎中便即有限今釋云向歎説不盡且略明之故云歎也言哀愍覆護我等一行等二發心求攝哀謂慈能生樂愍謂悲愍能拔苦覆乃覆陰護即持由上有慈悲二能此覆護具足喜捨之用如來既能無量設造能令於我法種增長故法謂菩提種即本有因也既逢世尊復植上因願此世及後世佛常攝受也言我久安立汝等一行明如來許攝佛意云我久於過去安立開覺今現攝受未來亦然故我今時應攝受汝也離三途名安得人天名立又可教斷生死之方名安與發大安名立也開文詮理名開發教解生名覺覺知善惡言我已作功德等第三勝鬘歡喜設禮處恭可解也言佛於衆中即為授記等者第四明授記也於中有三初總標授記二別陳授記三大衆歡喜言佛於衆中即為授記者述曰總標也問於三身中記何身耶答一義唯記變化身他受用身法身與自受用身不可記故有義自受用身可有記也言汝嘆如來至皆集於彼者述曰別陳授記於中二一授因二記果授因中有二初內德圓滿二主緣會遇也言汝歎如來至為自在王者述曰內德圓滿也由歎如來真實功德資益本有無漏種子令漸增長所資種子當得報身不能資有漏善種子能招地前十王果報故説天人中尊據位應得十王果報菩薩成而不取也言一切生處等者述曰主緣也於中有二初明見一佛二廣事如來言一切生處至如今無異者述曰明見一佛也如來記云汝於今生逢我稱歎願更餘生當現讚歎眷屬無捨問勝鬘有盡之身如來化形有極於茲永滅更不重生如何説言生生常見耶答有二解一云若勝鬘地下凡夫當見化佛佛於此土一面各有三十二一時成佛或次第生勝鬘捨身於彼稱讚以此化身相續故二云勝鬘既是八地菩薩見受用身或見佛報報佛常於此處大火所不能燒勝鬘常在此中稱歎有何過失言當復供養無量阿僧祇佛者述曰明主緣更多廣事如來也若依小乘初劫逢六萬五千第二劫逢六萬六千第三劫逢六萬七千也今大乘初劫五恆河沙佛二劫六萬六恆河沙佛三劫逢七恆河沙佛依涅槃經第十地菩薩事八恆河沙佛然勝鬘具事諸佛具緣不小也言過二萬阿僧祇等者述曰記果也於中有三初明時二列名即正報三舉果即依報言過二萬阿僧祇劫述曰明時也二果用證要三僧祇佛德既高無邊因感三僧祇劫必善心相續勝鬘三性所間或雜或純所以要經二萬僧祇初準此勝鬘未十信也言當得作佛至應正遍知者述曰明佛名正果也由佛普放淨光遍世間出為斯授記勝鬘名曰普光如來應正遍知略舉前立三德智斷及恩三德圓滿也言彼佛國土等者述曰第三明依果也於中有二初明所無惡二明所有善也明無惡中有二初果後因言彼佛國土至不適意苦述曰明無惡果也言惡趣無彼三途唯有人天又無八苦等事如理思取也言亦無不善惡業道名述曰明因也果既非有何得獨有其因故無不善業名也又解云老死人趣衰惱趣餘同前言彼國衆生等者述曰明所有善也於中有二初明果二明因言彼國衆生至自在諸天述曰明果也色故無老苦顏色不改故力故無病苦由無彼病氣力無竭故壽命故無惱必無壽命若中滅者臨死衆生法不生愛惱故云衆生等無不適意苦於一切二境中皆悉快樂故於六欲天中唯他化自在天欲境最勝今彼國內快樂過彼故云勝於他化自在天也言彼諸衆生至皆集於彼述曰明因也如師子王繞圍故今勝鬘所生之處當成大乘根器衆生共於彼國也言勝鬘夫人至皆當往生述曰第三勝鬘得記歡喜皆願生也上明真實功德語行始起自下明十大受身行久修於中有二勝鬘佛前而立自受下説第二章十大受第二世尊下作證求相前中有三總標得記第二別説受十受儀戒第三明得十大受之意言爾時勝鬘聞受記已恭敬而立受十大受者述曰總明得記也世尊者能授也大者出過二乘體用弘廣名之為大大有容納復名為受即是大受之受依主釋也恭敬者心肅曰恭形處曰敬二云立而受戒似慢今名恭敬立者佛立空勝鬘在地欲使言語通天故立聲聞自跪但支形恭不與心會菩薩二俱不妨今言立者即無二乘心也三云夫立者必持行之獨得勝受得意能行故起受戒為受者要受方行故問此中受為是受語為是持語答只持語乃至菩提不起犯心等即是持文又云恭敬而立受十大受即是受文於別説十依菩薩地有三種戒謂律儀等即此十中受之為三初有五種明律儀戒第二有四種明饒益有情戒第三有一種明攝善法戒然菩薩戒及八五戒通時因緣受若出家戒不能行臥受故無有自受其菩薩三戒起受心時要先斷惡方能修善由斷惡修善已始能饒益有情然此文相次第稍別由先斷惡故此前説菩薩起心法欲一利物故餘第二説饒益有情戒既能自惡已斷令他亦善於諸善品方能攝受故次第三明攝善法戒也律儀戒者斷一切惡菩薩戒內有四種者亦依此義文中有二初有一大受於性及遮若輕若重根本隨順但悉堅持第二有四受唯持其性非遮唯重非輕唯根本非隨順也於中有四即四波羅夷此名他勝處惡法損己名他勝處善法益已名已勝處何者為四種一若有財法不得吝惜二不得為名聞等自讚毀他三有怨嫌彼此相和四不得起大邪見謗無因果今此文中不依斯次從後向前説欲明斷惡邪見最重所以先明也言世尊我從今日至不起犯心者述曰第一總也言世尊我從今日至不起慢心述曰第一明第四不得起大邪見也慢者自恃非他高舉之相今於諸尊者一切功德尊宿之處不起慢心長謂師長有德之人亦無慢意由此不起增上慢邪見也言世尊我從今日至不起恚心述曰第二明第三不得賜歡喜也若有一人於我所生憎害心又若相共有怨嫌心相謝令喜不生瞋恨故云不起恚心也言世尊我從今日至不起嫉心述曰第三明第二不得為名聞等也若懷嫉妬於他身色及外衆具即是依止二根內外二果深生嫉妬所有造作皆為名等既無嫉所作不為名等也言世尊我從今日至不起慳心述曰第四明第一不施財法也由持戒故若內財法若外財法物不生惱恨是故不起四波羅夷也於四大受明饒益有情中有二初之二種明慈與樂行第二有兩大受明悲拔苦行於初中有二初畜淨財二明攝受有情也言世尊我從今日至貧苦衆生述曰置淨財也菩薩所有錢財有三種一敬田謂三寶二悲田謂貧苦等三中容田謂從子等菩薩願所受畜皆為此三不已名等置錢財等言世尊我從今日至一切衆生故述曰第二攝受中於中有二初總後別此即初也菩薩所畜不自為己樂行四攝利益一切衆生四攝者謂布施通三二愛語柔和悅故三利行樂勸為善四同事共所作業故名四攝也言以不愛染心無厭足心無罣礙心攝受衆生述曰別受解然世間中有三種心極急可汙一於知識生愛染心二於怨家起殺害心三於中容人起不攝受心今菩薩無此三種故名四攝圓言不以愛染心者無第一故言無厭足心於諸怨惡不欲棄捨生懷念之無礙心者於中容者當欲攝受不生捨相也二云無釋疑故衆疑既問愛諸攝物情謂菩薩染心説更有即足有礙故解云大衆宜聞故説非染心故既無有染即無足無礙也三云不同凡夫故無染不同二乘無足俱離此二即無礙心也上二名與樂也下二明拔苦於中有三初拔現在苦果二明拔未來苦因初中有二初標宗二釋所以言世尊我從今日至終不暫捨述曰標也勝鬘意云若見孤謂無父母若見獨謂無兒等幽謂深加重縛繫謂枷鎖等繫病即惡風種種危難者危謂危怖難謂厄難困苦衆生通結上也若見此類終不暫捨何以故引言必欲安隱至然後乃捨述曰釋也若見危難令得安隱義有二義一財義二道理義若見孤獨人必以財義饒益然後乃捨若見幽繫人道理拔彼令得饒益後方可捨若有疾病等人安慰與藥令除重病饒益方捨也言世尊我從今日至終不棄捨述曰第二未來苦因也於中有二初舉宗二釋所以於前有二明衆生造業我見生念第二正明折伏此即初也然惡律儀經論有異如彌勒疏説律謂法也儀謂戒也有所法戒故名律儀今造衆苦行彼淨戒名惡律儀律儀之體非造惡也勝鬘發意若見惡律及有破戒等人終不棄捨令廣造罪欲何所作耶言我得力時至而攝受之述曰正明折伏也勝鬘云我自無力所不能為若不得有人王力時也又得衆生機根感我無量力時降伏有二謂剛強衆生二隨順者若剛強者必苦折伏之若隨順者應業攝受之此舉宗竟釋所以中有三初徵起所由二正釋所由三結攝之意言何以故者述曰徵也於正釋有二初舉不捨二明得益言以折伏攝受故述曰總舉不捨也此文中總應別論云言該下二故者結於下若剛強者當折伏故隨順者應以攝受故言令法久住至而得隨轉述曰明得益也由攝持此二種有情故諸惡法離善法俱生教不自陳要由人説既流機學正法不滅故云令法久住也由法久住人天多惡道少善根純熟既有斯事常説過佛正法輪起恆隨如來聽聞勝法也見是利故等述曰於第三明攝善法戒中有三初標宗二釋所以言世尊我從今日至終不忘失者述曰標宗也攝者包含義法界善法修受者領納義衆善法須念也於此正法欲不忘失也言何以故者述曰下釋所以於中有三初徵二釋三明忘失有損此即為初徵竟釋中有四即是大乘教理行果言忘失法者至則不欲大乘者述曰釋也忘失法者謂失教法也忘大乘者謂忘理也忘波羅蜜者謂無行也不欲大乘者謂不得果菩提涅槃等果也言若菩薩不決定大乘至越凡夫地者述曰明忘失有損也不決定者謂無勝解勝解若有於大乘等深生決定既於大乘不能決定由無勝解即涅槃心中生勝解脫教法不習則不能攝受正法無有法即欲於四善根隨所樂入之義永絶由是不能越凡夫地也言我見如是無量大過至故受此大受者述曰第三勝鬘明受之意既見現在無量過失深生欲斷復見未來正法可攝菩薩功德無有邊際為有斯利故我今日受此十受也上雖有三文今是第一受十受也自下第二法主證明勝鬘請應於中有六初法主為證二勝鬘求相三瑞相現前四大衆俱見五同時發願六如來許可言法主世尊現為我證者述曰勝鬘引佛為證明法真堪可遵持世絶言故於請瑞相中有二初起請所因第二正明發請前中有二初為根薄疑生長夜不安非義饒益也言惟佛世尊現前證知至極難度故述曰有情根薄疑生故須請證如來雖為我身作證現有情類不能悟解何以彼善根極為微薄從聞深理疑惑便已何以生耶以十大受極難受故度者到彼岸也言彼或長夜至説誠實誓者述曰衆生長夜不安非義饒益故今日請瑞相證明而衆生等惱於長夜起不饒益事不得安樂受諸苦為安彼故令常得樂故我今於佛前説誠實誓誓言何耶言我受此十受至出天妙音者述曰第二正明發請也我今日受十受十受功德如説依行終不棄捨誓當護持永無忘失願行威力於大衆中一雨華出音證明我誓令法非利益群品華有過惡結果二能聲有引悟依學兩用為此故祈斯相也言説是語時至真實無異者述曰第三瑞相現前也由前發誓其心王至如來為應出聲雨華於音樂中而聲言曰如説行者如是如是正法無鎖真果疑可當依學也言彼見妙華至喜躍無量述曰第四大衆俱見也勝鬘眷屬俱見此事一切衆會疑惑除滅喜不息止也言而發願言至同其所行者述曰第五同時發願也願有二種我等大衆願常同生不相捨離二若有衆行所習無殊也言世尊悉記至如其所願述曰如來許可也雖有二受即是初文二行下有二受明教散定二願於中先散後定散中有二初勝鬘發願二如來讚嘆前中有二初總標發願之意二別發三願言爾時勝鬘至無邊衆生述曰總標也我已行之今發實願安慰有情無苦得樂益諸衆生已下三願文即為三言以此善根至第一大願述曰此發正法之智願演教智也言我得正法至第二大願述曰由前發正法智已若得願於無量劫中為諸有情常説妙法永無疲厭勞慮之心也言我於攝受至第三大願述曰由説法無厭故於攝受正法中所有身命財等不吝惜心常能護持正法不壞故護者守護持者任持正法終無忘失言爾時世尊即應勝鬘至三大誓願述曰第二如來讚嘆有三初法二喻三合法此即初也汝既能發斯三願體用弘廣名為大故言如一切色悉入空界述曰喻也如衆色空界能納今此如室除喻若不見惡言如是菩薩至真實廣大述曰合法也恆沙大願皆入三內以三願體用弘廣故云真實廣大也於定願中有二初略二廣略中有四初勝鬘請説二如來聽許三勝鬘正説四如來讚嘆言爾時勝鬘至真實無異述曰初請説也勝鬘言今復承佛威神更請調伏大願定非虗妄調謂修善伏謂折惡或調者自利伏者利他或住前有漏相心所拘為相心所間非為調伏今明無相真解不為相心所間故言調伏也問上之三業皆無承佛為何此處獨得此名耶解云有二一云上三心是住下之行是己智分不假承佛今攝受正法十地行願深取遠非我境界要須承佛二云初章正明常住佛果理實是難為奉來書書上具載勝鬘披已隨解無疑因即歎説今日此章行願二種無所載勝鬘生長但住深宮未聞聖旨仰空對佛請加方説以此行願非凡小知唯佛能悟故此經云如來述讚此攝受正法皆是三世諸佛共所歎説今我亦然功德無量故此一章獨有承佛之言也言佛告勝鬘恣聽汝説述曰第二佛許也恣者從任汝隨意所説我今加有三三謂三業也初顯示無師身身加也二歎勝鬘語加發此二業心有二即思即是心加故今恣説故言勝鬘白佛至真為大願述曰第三正説有三初攝受總只名攝用歸體二所謂下正出願體三攝受下結歎願勝然總意云也菩薩所有無量諸願無不皆入一大願中何者是耶謂攝受正法願乃至包含法界善法皆盡名之為攝也此願真為大願故於如來歎中有二初如來讚嘆二勝鬘復歎前中有三初歎智謂二能第二引三世諸佛為證三自行為證也前中有二初歎智二歎説言佛讚勝鬘至甚深微妙述曰汝有智慧方便非下所知甚深微妙不可思議也智慧者實智也方便者權智也實智照實名甚深也權智巧用名微妙也亦可二智俱深俱巧也言汝已長夜至解汝所説述曰歎説也汝久植善本來世有情若非久植善根餘者未能解汝所説也汝所説甚深難測故言汝之所説至今説當説述曰引三世佛為證己不但汝今始説此攝受正法過去三世諸佛曾已廣説故言我今得無至攝受正法述曰自引為證也何但三世諸佛已説我得無上菩提已來常亦説也自下勝鬘復説歎前中有二初標二釋也若準梵本先説後智慧今翻譯者依此本不據彼方若論此因應先智慧後方説故於中有二初標説二標智也言如是我説至不得邊際述曰標説也如是説攝受正法所有功德若欲窮之不得邊際三十二相中梵音聲相最為殊勝故言如來智慧辨才亦無邊際述曰七辨無盡豈心慮所及乎言何以故是至有大利益述曰釋也是攝受正法功德利益俱無量故已上略竟於廣中有二初勝鬘廣説二如來隨喜前中有二初勝鬘承加廣説二推功歸佛前中有三初勝鬘請説令佛加持二佛許説三正説也言勝鬘白佛至廣大之義述曰請也言佛言便説述曰許也於正説中有二初總標有三第二依標廣説言勝鬘白佛至四千法門述曰總略也既言攝受正法廣大義何者是耶今有三義一是無量出生廣故二一切佛法成就廣故三攝八萬四千法門包含廣故具斯三義名為攝受正法廣大義也下釋中有三解此三故有何所以有此三耶答以上發三種大願故一得正智當今無量也二以無厭心為衆生説當今第三八萬四千法門也三護持正法當今第二一切佛法也雲水地藏四字解上無量也六波羅蜜下解上八萬四千也捨三得三護持正法下解上得一切佛法也問何故標中不説前以後廣釋中乃有前耶答標中標果為論要先以根成熟後方攝生為是所依前義次第下廣釋中果既由自隨因次第更不可説也於釋無量中有四義一雲顯內德融故二水他滿故三地攝益足故四寶藏包含具故問何故三地攝四喻次第答劫初雲能普覆雲雨日心水聚為喻水枯歸地為喻地中有藏為喻前中有二初喻次法也言譬如劫初成時至及種種寶述曰喻也二十劫空訖從上向下成器世間界至四空居天竟於炎摩天中大雲露乃遷二千界雲中起風二邊其中風下堅鞭繞四方持漸復下雨有水風擊有金為地輪地輪上更有水成海以向上名為須彌山有七金山四大洲起故大雲內出生無量有果五雨及以種種寶謂四色故東黃金南琉璃西白銀北水精也東名勝身面目端嚴故南名瞻部從樹得名故西名牛貨用牛為市故北名拘盧地側四方故此得舉喻也言如是攝受至善根之雨述曰法也由此攝受正法出生善根之雨無量福報隨二即而生今此文中不依次第先果後因也於第二中有二初喻後法言又如劫初成時至種種類洲述曰舉喻也三千界藏者謂一佛所化水所持也四百億種種類洲離此三千為四百億億類不同或以百萬為億或以萬萬為億進不就廣退不就略但取中間千萬為億億亦不多錢團不少得百億名名不不殊一須彌其四天下既有百億須彌約四天下百億一四百億也言如是攝受至皆於中出述曰法也攝受正法者如喻三千藏也一切菩薩也一切菩薩神通之力者喻東方勝身洲一切世間安隱快樂者喻西方牛貨洲也一切世間如意自在者昔不自由聞攝受法後得自在也及出世間安樂劫成者明得淨土也乃至天人本所未得皆於中出者總結上四也於第三中有二初喻後法也言又如大地持至四者衆生述曰舉喻也大地能持四種擔也於法中有三初總標喻地二徵別含四三結四同喻言如是攝受至喻彼大地述曰今攝受正法能含四種衆生即如於地也言何等為四至攝以大乘述曰別説有四為常所説也言是名攝受至為世法母述曰此即結文於中有三初結同彼大地負四種之擔二結與衆生作不請之友三結為世法母如文可解自下第四於中有二初喻次法言又如大地至四種寶藏述曰如意名無價海岸名上價金等名中價銅名下價此舉喻也自下舉法於中有四初總舉同喻二問起三別同四結言如是攝受至最上大寶述曰總同也言何等為四述曰問起也言攝受正法至授以大乘述曰別同也言如是得大至攝受正法述曰此即結文其中有二初結衆生得寶顯由攝受正法二結大寶即是攝受正法也如文可解自下解攝八萬四千法門其中有二初以總即別教二以總即別行言世尊授受至即是攝受正法述曰將總即別別復即相即故體無異自下於即別行中有三初標二釋三結也言世尊無異至是波羅蜜述曰總標也準前教應言世尊攝受正法攝受正法者無異波羅蜜等然翻譯家不能繁廣以前置訖後文略之但言無異波羅蜜等也別釋中有二初徵後釋也言何以故攝至子善女人述曰此徵記也善男子等言該下六度前六度中文即為六自下説布施中有三初標其所化二以施成熟下同行攝三是名下結己化行為波羅蜜義言應以施成熟者述曰第一標其所化也於同行攝中有三初菩薩自行布施二將護彼意下以施攝他三彼所熟下明所化衆生因化德位也言以施成熟至捨身支節述曰第一菩薩自行施也言將護彼意而成熟之述曰第二以施攝他也言彼所成就建立正法述曰第三所化衆生德也言是名檀波羅蜜述曰第三總結也下餘五度皆如施中不能繁述自應準知於戒中有三言應以戒成就者述曰標所化也言以守護六至正四威儀述曰菩薩自持戒也言將護彼而成熟之述曰以戒攝他也言彼所成熟至建立正法述曰所化答言是名等述曰第三結也自下於忍中有三準知言應以忍成熟者述曰標所化也言若彼衆生至顏色無變述曰菩薩自行忍也若有衆生種種罵辱無恚心者耐怨害忍也言饒益心者安受苦忍也第一忍者諦察法忍也言將護彼意而成熟之者述曰以忍攝取也言彼所成熟至建立正法述曰所化益也言是名等下述曰第三結也自下精進中亦有三言應以精進成熟者述曰標所化也言於彼衆生至若四威儀述曰菩薩自行精進也言不起懈怠者被甲精進也生大欲心者攝善精進也第一者利樂精進也言將護彼意等述曰以精進攝取也言彼所熟等述曰所化益也言是名等下述曰第三結也自下於禪度中亦有三言應以禪成熟者述曰標所化也言於彼衆生至終不忘失述曰菩薩行禪也以不亂心者安住靜慮故即四禪中現法樂住也不外向心者引發靜慮也但能引發無量神通心恆緣內故第一正念等者辨事靜慮也以能成熟一切有情於所作所説久時不忘失故言將護彼意等者述曰以禪攝取也言彼所成熟等者述曰所化益也言是名等述曰第三結也自下於智慧中亦有三言應以智慧成熟者述曰標所化也言彼諸衆生至工巧諸事述曰菩薩自行慧也顯菩薩具學五明論成熟衆生故言將護彼意等述曰以慧攝取也言彼所成熟等述曰所化益也言是名等下述曰第三結也言是故世尊至是波羅蜜多述曰第三結文也自下於第二得一切佛法即是前文三大願中第三護持正法也文分為三初請説二佛許三正陳言世尊我今承佛威神更説大義述曰請説也復佛三加我今更説也言佛言便説述曰佛許也佛言汝隨時宜順便應當更説也自下正陳中文有三初將法即人二釋上所以明即有三別三明擁護也前中有二初明人法無異二明相即言勝鬘白佛至攝受正法述曰明無異也者謂假者即五蘊也人人無別人攬別法以成總假人故今行攝受正法別行即是攝受正法者總離別法無體故名無異也言攝受正法至即是攝受正法述曰明即是無異也既言攝受正法善男子即是攝受正法故知法即是其人也自下於釋所以中有三初憑上所以作勢生起明人法相即有三分義第二明捨三得三第三總結前中有二初問起二正釋也言何以故述曰問曰有何所以攝受正法無異者故復言即耶次文是答也言若攝受正法至捨三種分述曰釋也有何所以得知即法為人以能捨三種別故以知為即何者是耶自下別解中有三初徵起二略答三別解也言何等為三述曰問也既言有三何者是耶言謂身命財述曰略答也捨身謂將己身助化造作不惜功力等也捨命者謂不顧身命能有拔濟衆苦等事捨財者謂能具捨內外財故也別釋此三中文即為三前中有二初明起常等二明五德也言善男子至生死後際等述曰明迷悟等也言生死者謂染縛也後際者謂還滅也言等者此二無異也何以故者以彼真如迷悟依故若有智慧達解則為後際涅槃若有愚癡迷謬則生死逐起謂無涅槃名染縛故言離老病死至如來法身述曰明五德也一離老病死德二所不壞常住德三無有變易四不可思議功德五如來法身德也於捨命中有二初明無異故等如前解可解二明五德也何者是耶言捨命者等述曰明生死涅槃無異也言畢竟離死至甚深弘法述曰明五德也一畢竟離死二得無邊三常住四不可思議功德五通達一切甚深弘法也於捨財中有二初明無二故等二明六德何者是耶言捨財者生死後際等述曰明生死涅槃無異也言得不共一切衆生至殊勝供養述曰明六德一不共德二無盡無減德三畢竟成就德四不可思議德五具足功德六供養功德也言世尊如是至之所瞻仰述曰總結也言世尊又善男子等述曰第三明能護也於中有二初正法將滅四衆乖反二以正直心入彼和解也言世尊又善男子等者是即初文朋黨謂互相扇惑也諍訟謂彼此言斷也言破壞諍訟故然云離散朋黨故爾也又云朋黨意業也諍訟語業也離散身業也言以不諂曲至入法朋中述曰明和彼也於中有二初明不惜身命和解二為如來所記也此即也此即為初此以五種心能和於彼諍訟乖違一不諂曲身業二不欺誑心語業三不幻偽心意業已上三種不同惡也四愛樂正法意業也五攝受正法語業也入法朋中身業也下三同善也為此三心所拘礙故入法朋中不趣邪徒之內也言入法朋者至之所授記述曰如來所記也言世尊我見至亦悉知見述曰第二推功歸佛明佛為證顯法可行也於第二如來隨喜中有二初經家標舉明佛起隨喜心二正明隨喜心也言爾時世尊至起隨喜心述曰此經家總標明佛隨喜意既能攝受正法是大精進力精謂精純進謂悍勇故名精進也於正喜中有三初明精進力大二勸勝鬘攝受三引自為證也前中有三一謂力士二牛王三須彌山王也力士中有二初舉喻二法合言如是勝鬘至大苦痛述曰汝既能持攝受正法大精進力無能屈伏如大力士以小威力少觸身分彼人生苦無窮也言如是勝鬘至令魔苦惱述曰合也有二舉餘反解此初菩薩解具此攝受正法能除四魔以小力故衆魔退散修自利善根名為少分魔皆憂苦由少攝受正法也言我不見下述曰翻解不見凡夫二乘小善令苦小善也於牛王中有二初舉喻二合法言又如牛王至勝一切牛述曰明喻也然此牛王有五種相謂角峯胡歸局形色嚴麗諸牛中勝名曰牛王也言如是大乘至以廣大故述曰一切善根有三差別今此攝受善根勝餘二乘善根唯舉利他一德名為少分何以故耶大乘以廣大故也於山王中有二初舉喻二二合法也言又如須彌山王至勝於衆山述曰然須彌七重山內最為殊勝名為山王也言如是大衆至以廣大故述曰攝受有二一不捨身命財謂地前初住菩薩二捨身命財復能攝受正法地上菩薩故云勝不捨身命財大乘初住菩薩善根尚不同地上菩薩善根何況二乘有善故云何況二乘所以者何以大乘廣大故也問曰何以要有三種喻耶答有五解一云上文云攝受無量一切佛法攝八萬四千法門也今力士即無量也牛王者即攝四千也須彌山王者謂一切佛法二云有三種行謂離惡利生攝善今力士者離惡行也牛王者利衆生行也須彌山王者攝善行也三云三乘故力士勝聲聞也牛王者出緣覺也山王者出於七地也四云佛有三身故五因有三惑故六用有三明故七能除三毒故八能修三學故九能出三居故十永離三塗故力士取力勝牛王取外好勝山王取體勝又云力士喻降魔勝牛王對二乘勝山王形地前勝言是故勝鬘當以攝受至建立衆生述曰第二勸學也於中有二初明勸勝鬘開演也二明開演利益此即初也然即衆生三種機別一最下二中三言開士為下機力士也言教他者為中機牛王也言建立者為上機山王也或有衆多三分如所述也言如是勝鬘至如是大果述曰明利益也與聲聞乘名為大利力士與緣覺果名為大福牛王也與大乘果名為大果山王也更有餘三準前可解也言勝鬘我於至不得邊際述曰第三引佛自下證也於中有二初説難盡二難功德無邊也此即初也佛言此攝受正法於多僧劫説之難盡也不但説之難窮功德復無量何者言是故勝鬘至無邊功德述曰總結明功德無邊也上來四章明行訖自下第五明果於中有二初明佛勸説二勝鬘承力正陳也言佛告勝鬘至攝受正法述曰佛加勸説加有三加謂身語意如上具辨問上之四章如來不勸勝鬘自陳何故此中佛加勸説耶答上之四行已曾修學所以自陳今果雖復通因今位曾未來修非己之分所以須加也昔開一為三未明合三為一勝鬘則為破念恐其情違於聖教為此要待佛告於正説中有二初勝鬘敬諾歎仰受教第二承力即説也言勝鬘白佛至唯然受教述曰承佛威力敬諾於故故曰唯然也説中有二初明出生名曰大乘二六處下攝入故名曰大乘門何以有名二耶答有二義一云若定姓智定皆從大乘中出名出生名大乘也二云若不定種姓及大乘種姓畢竟還歸大乘名攝入大乘二云於不定性中有二義若始從小教趣小果時名出生故名大乘若已回心歸大乘時名曰攝入故名大乘也於前明出生名大乘中有三初總標略舉二釋所以三結成也言即白佛言至是摩訶衍述曰略標舉也今言攝受正法者即是摩訶衍摩訶衍者名大乘故此名訛應名摩訶耶那方語謬名為衍故於釋中有二初總次別總中有二初徵後釋言何以故述曰徵也言摩訶衍至出世間善法述曰總釋也何以故者有何所以攝受正法即是摩訶而能出生三乘等耶答意云摩訶衍者是總總能含別為是能出三乘等也於別釋中有二初出生德二依生德出生德亦有二初舉喻二合法也言世尊如阿耨等述曰舉喻也言阿耨者名曰清涼無諸熱故此名謬略應言阿那婆達多池故此在香山南雪山北深五十由旬方亦如是其岸亦高五十由旬除非得通人方能往彼此池出四大河南殑伽北信度西徙多東博芻作牛頭等此四出已各繞池一周入四方海也此四河出至五十由旬各分為五四有河何故此中言八大河耶答餘經中四者據本説復有餘經言二十河末並合説此中言八者説此經在南面河分五河更取餘三方根本名曰八河南取末除本餘取本非末也言如是摩訶至出世間善法述曰合法也可解問喻中八河為況法中但有聲聞等四如何喻相喻耶答法中還有八義即此四中俱有因果二義即名為八義也言世尊又如至而得生長述曰此名依生德世間一切種子皆依於地而得生而得長也言如是一切至而得增長述曰合法也三乘等種依大乘而得增長也言是故世尊至出世間善法述曰總結有二初大外無小小外無大二世出世亦爾故得為生為依也於攝入明一前中有二初明因攝入二明果攝入前中有二初總標二釋所以言如世尊説至説此六處述曰此總標也文有三別一引佛誠説二別徵三別列明説也此六法中三義所攝依四法迹謂無貪無瞋為戒學迹正念定學迹正定慧學迹戒學但是威儀不能斷惑唯有定慧方能滅除今此文中依斷惑次第先定慧後説戒學以定慧二能斷惑修善故名住名滅住故善法得生滅故諸惑皆盡也前四名所受教法後二名能受者行法前四中前二經法後二律法又六法中為三對初二住滅相當中二廣略相當後二始終相當若此六法趣聲聞果即是小乘家近方便與大為方便方便大乘也波羅提木叉者名為解脫略本也毗尼者名為調伏廣本也何以故下釋釋中有二初徵後釋何以故謂徵也釋中有三釋彼三學文即為三言正法住等述曰解住也通定慧二學故言正法滅等述曰釋滅也通二學故言波羅提木叉等述曰解戒學也於中有二初解波羅與毗尼無異第二明出家受具足言波羅提木至第一名異述曰明無異也此二廣略有異而體無殊同明戒學義故於解出家受具足中有三初正解毗尼即大乘學二明上所以結歸出家受具足三引阿羅漢為證明無異言毗尼者至受具足故述曰解毗尼也於中有二初標二釋釋中有二初徵後釋言毗尼者即大乘學者標也明與大乘為方便畢竟歸本故何以故者徵問起也以依佛出家而受具足者釋所以也以三乘學果隨依佛學故出大乘學也言是故説大至是受具足述曰乘上所以結為出家受具足也而雖後起果不同畢竟是歸大乘故此六法為大乘説也有何所以得者知耶言是故阿羅漢等答上所以也第三引阿羅漢為證也於中有二初標二釋言是故阿羅漢等述曰標宗也阿羅漢人無自能出家要依佛故又云離大乘外無有羅漢能自出家要依大乘也此中既云緣以有麟角喻人亦見佛故唯有諸佛自然得戒也言何以故述曰釋也有二初徵後釋所以此即是徵言阿羅漢依至受具足故述曰釋所以也阿羅漢人要依如來出家等故知六法為大乘故説究竟歸本故於第二明果攝入中有二初略開二章二略廣釋上章言阿羅漢有恐怖述曰略開二章也初歸依佛章以色法未盡有歸此明心失二有恐怖章以對治未滿五住地在有怖此明行失由是阿羅漢又須依於佛猶有恐怖標宗也下釋中有二初略釋二章二阿羅漢得辟支佛下廣釋二章略中有二初言便先釋恐怖章二何以故世尊依不共依下釋歸依章前中有三初法次喻後結言何以故至怖畏相住述曰法説言一切無有無謂空無即空觀也行謂緣空之智若菩薩依止空智而無怖其阿羅漢人依大乘教觀空之智逐相住故名怖畏相住明二乘未修三乘之外對治無明住地之行故故言無行也恐怖者變易生死也相者是慧於空住法不解名相也住者此二乘利相者自智解不滿住者餘地名住也若順此方應云住相今順西方故名相住也言如人執釰欲來害己述曰喻説無明為貪應因果相去甲如執變易生死如釰已者羅漢是二乘已修自地名已滿謂無生死今為變易生死墮後故名害己喻成相也言是故阿羅至無究竟樂述曰明阿羅漢既是恐怖即知無畢竟樂也言何以故阿羅漢依不求依述曰釋歸依章有三初法次喻後結言依不求依者不求依謂如來更無有人能與如來為歸依處故名不求依今羅漢依如來得住故名依不求依言如衆生無依至則求歸依述曰喻也二喻二乘不能與他為依如似多生於他無依一彼無明二彼生死故言彼彼如此衆生有恐怖便即求依羅漢既恐故知求也言如是阿羅至依於如來述曰能成依佛也於廣釋中有二初滌有恐怖人二是故阿羅漢下正解怖畏歸依於中有二從初至無邊不斷如來解怖畏二如來無有齊限下廣解歸依於中有二初正明怖畏二世尊彼者所得地下正明攝入一乘前中有二初略明二乘不得菩提二何以故唯如來下廣釋前中有二初明無菩提二明無涅槃言世尊阿羅漢至當有所斷述曰明無菩提也約四智文則有四然四諦有二謂有化四聖諦二無化四聖諦應唯無分段生名我生己盡未離變易生故名有餘生法不盡故有生也道有二種謂生空法空若唯證生空智名梵行已立若未證法空智名有餘梵行成故不純也滅有二種謂有餘等二云不住處也若住有餘等二名所作已辦若未得不住名事不究竟故當有所作集有二種謂二障也若唯斷故煩惱障盡名不受後有若未斷所知障名不度彼故當有所斷也此上明無菩提也言以不斷故至槃界遠故述曰明無涅槃也以未斷煩惱畢竟無有三事大涅槃也下廣中有二初廣涅槃二觀察解脫下廣菩提前中人二文有五對人二者如來二乘也問直明二乘不得以竟何須名如來得耶答有三義一舉如來得顯三乘本來不得也二云舉如來得顯與二乘為歸依處五對中前四明得不得義第五雙結前四中有二初三明行德分別後一顯斷德分別前行德中有三初寬狹次淺深後粗細以四中先明如來得後明二乘不得一一句中皆有四句初二明如來得後二明二乘不得翻前二也亦有別解明我生已盡智等現五對中前四如次第一有為無為對無寬狹對言何以故唯至是佛方便述曰二乘唯得無為言無涅槃如來具證實得涅槃也然無為中有二謂真假第二對也言唯有如來至是佛方便述曰假實對亦名淺深對如來二種俱有名有涅槃二乘唯得是假名無涅槃言唯有如來至是佛方便述曰第三對於假擇滅中有二若聲聞唯得煩惱障假擇滅若如來具證二障假擇滅故於如來名得涅槃粗細對也言唯有如來至是佛方便述曰於假擇滅中有二謂種習對也若聲聞唯斷種子不除習氣若如來具斷二種名得涅槃種習對也言唯有如來得般涅槃至去涅槃界者述曰法身解脫對若聲聞所斷唯得名曰解脫身若如來所得名曰法身為三界尊作四生主人天敬仰八部遵持故説如來實得涅槃若聲聞是方便也於廣菩提中有二初總明聲聞不得四智二別顯言阿羅漢至不了義説者述曰總也有二初明如來昔之得四智亦是大乘有餘經所説二乘人觀察有得四智名得蘇息處已上以隨他意語不了義説方便引導非真實得唯佛世尊名為真得問曰化城不得實方便説二何故羊鹿非實然則具説三耶答涅槃唯果德假真説二成事有因果別行異説三車也於別顯中有四番我生已盡智等四智文分為四即十四智於盡智無生智中分為四智言盡智無生智者智能斷惑名之為盡盡中得智名為盡智知彼煩惱當結不生名無生智於此二智中離為四智緣於生死盡處名我生已盡於中離出梵行已立智云何得知修斷道意欲斷生死生死既盡我行得立故盡中離出梵行已立智也就無生智中離出所作已辦智知當無生可愛名不受後有智知當無生不斷不復作行名所作已辦故知無生智中離出所作已辦智也又解脫境有四我生已盡不受後有緣滅諦生梵行已立所作已辦緣道諦生生明苦諦智中有二初泛舉道理二正明未盡智義前中有二初問起總徵二別顯相貌何以故有二種死者述曰問起也問意也有三義一云總徵下四云有何所以二乘四智俱未圓耶若據下釋皆別徵又此中未必為總二云但徵初人有何所以我生未盡是佛不了義説耶下別顯中有三初問次列後釋言何等為二者問也言謂分段死不思議變易死者述曰列也言分段死者謂虗偽衆生者述曰此解分段隨業長短壽有齊限一期各別名為分段段即分故生死即分段俱持業也謂虗偽者既處三界因果俱漏名曰虗偽也言不思議變易至無上菩提者述曰妙用難測名不思議改後轉本形名為變易有三種得謂阿羅漢辟支佛大力菩薩意生身乃至涅槃常受此身於中不斷今言生者非也既不辨體何得言生耶今解三種意成身但轉本形非新生故問此中欲明我生已盡何故乃言二種死耶答此中據實相生非死以約無常相行應説生死二名但以生者仰觀死者厭觀今約厭觀但言二種死故問三舉死明知生今何故乃明梵行已立等三耶答實唯明我生已盡不欲明後三乘義相連故舉為成初一故總明也二正明我生已盡於中有二初明四智相二結歸我生已盡也前中有四四謂四諦言二種死中至我生已盡者述曰明離分段生死名生已盡不無變易名不了義也言得有餘果證故説梵行已立者述曰明滅智也唯證有無二依名梵行已立梵者淨也即真如故行謂因也言凡夫人天至説所作已辦者述曰明道諦智凡夫人天但依伏不斷道智不得三果四向名七唯能斷惑所作未辦唯阿羅漢能除虗偽煩惱盡名所作已辦也言阿羅漢至謂不受後有者述曰明集諦智也既斷煩惱障發因俱無名不受後有也上別明四智訖自下第二結歸第一苦諦智也言非盡一切煩惱至故説不受後有者述曰上來雖舉餘三意明第一我生已盡也於釋梵行已立中文有二初總舉明障不斷二別顯差別言何以故至所不能斷者述曰總也此文中翻譯者謬不受言煩惱非二乘斷通三乘故應言有障非二乘斷不障二乘故別顯差別中有二一別明四住地二明無明住地前中有二初標宗有二第二別解二種前中有三初標顯形第二徵三列也言煩惱有二種述曰舉數也言何等為二者述曰問起二也言謂住地煩惱及起煩惱述曰列名也下別解中有二初解住地煩惱明有四種第二乘前解起煩惱前中有三初滅住名四二徵有四三釋其四言住地有四種者述曰舉數名也住者是現行居止之處名地種子能生上心之義喻地能生萬物種子亦然也言何等為四者述曰問起也言謂見一處至方名有住地者述曰列名也古來大德解云三界諸見名一處住三界中無明名無明住地欲界除見無明名為欲愛上二界并除無明見名色愛之有愛住地今基法師云不然若三界無明名無明住地者即應三乘同斷如何乃言唯有如來涅槃智之所能斷耶以此準知前解未可然障有二謂煩惱所知所知無明是勝總立名無明住地煩惱障中分成見修見道以見為首發業迷理是增以一時斷但是分別總立名見一處住地修道迷別事生斷復前後復要須數宜為此約界分成三種欲色二界自界得名無色恐執為無顯是三有破外道計為涅槃為名有愛非是無也於第二乘前解起煩惱障中有二初牒前四住地能生起煩惱生起下文辨自住地功能二此解起義言此四住地生一切起煩惱者述曰釋四功能能俱能生起一切煩惱也言起者剎那心剎那相應者述曰正解也起者現行義也不起即已起即與心相應名起煩惱起已纏繞其心亦名為纏也上總解四住地訖解無明住地中有二初總標二別顯義言世尊心不相應無始無明住地者述曰總標也問何故顯此所知障名心不相應耶答所知障唯約種子為論故言心不相應若據現行名相應故餘四住地即云起故也於別顯中有四初明數多二為大三辨依四結前言世尊此四住地力至所不能及者述曰數多少也但有人執必法執法執有時未必人執所以為少法執為是多故云所不能及也明力中有三初標法明力大二舉喻成力大三結喻顯力大言世尊如是無明住地力至最大述曰標力實大四住之中不能大故言譬如惡魔波旬至自在殊勝者述曰喻也諸天雖無量類然天魔色力壽命眷屬衆具相勝除天名為勝也言如是無明住地力至其力最勝者述曰合法也可解言恆沙等數至久住者述曰第三明依也然與自現行為依復能具四住等為所依義也言阿羅漢至最為大力者述曰第四總結唯有如來能斷二乘不除故知無明其力極大也
