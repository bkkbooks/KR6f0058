body:
  text: 大乘慈恩基法師說門人義令記於第三明道諦智中有二初明二乘不得四智第二明如來得四智前中有三初舉喻顯此有三二意即生第二牒四住地無明住地作業不同第三將無明住地與四住斷處懸別前中有二初舉喻二出法言世尊又如取緣有漏業因而生三有者述曰三界處生要須名言種子為親因愛取業為增上緣三有果起今不取名言為因乃用有漏業為因愛取為緣以業望果有大勝用故說為因愛取資助既能說為緣故於明法中有二初乘前起後明亦有三第二說三種意生身因緣是爾言如是無明住地至三種意生身者述曰昔由有漏業所感得身若隨業力不久即滅聖者即欲三劫修因恐廢長時修涅槃行乃將定願無漏資助感身今身業令彼長時與果不絶所知障助為緣無漏有分別業為因有三種意生身謂阿羅漢辟支佛大力菩薩阿羅漢喻欲界辟支佛若色界大力菩薩猶無色界成唯識名大自在菩薩謂八地已上皆得相土二自在故名為自在問何故楞伽經云前五地名三摩跋提業樂法意生身六七二地名覺法自性意生身八九十地名種類俱生無作行意生身然今此經即言羅漢等三耶答此經據三乘決定者作言羅漢辟支佛以前三果回心受變易不定故菩薩之中唯據頓悟大悲增者要八地已上方受變易身其楞伽經唯據頓悟不說二乘漸悟唯論大智增上非增上者故前五地已還修五度故名三摩跋提樂法意生身六七二地既得無相在身猶有加行名覺法自性意生身八地已上與前相似名為種類任運起故名曰俱生更不作功用名無作行二種經各據一義亦取不相違也言此三地彼三種意生身至依無明住地者述曰第二諸因緣意爾於中有二初明依二明緣無明住地彰三身起無始時義此三地者謂羅漢辟支佛大悲菩薩樂受生時也彼三種身由無漏業資無明住地為緣須正逐生也言有緣非無緣至緣無明住地者述曰二明緣彼定此三種三身彼有緣非是無緣故在生是故三身無漏業為因無明是緣也言世尊如是有愛住地至業因者述曰第二明五住地作業不同也有愛最上微妙故今偏舉由四住地能發業而生通不善故其所知障以非發法發潤唯有覆故但能發有覆無覆二業不能發不善之業故說不同業也於第三明無明住地與四住斷處懸別中有二初總標第二別顯所以言無明住地異離四住地至佛菩提智所斷者述曰總標也無明住地與四住地異亦離於彼唯佛能斷非二乘除以不證法空故何以故下釋所以於中有二初明二乘證理不盡二明二乘不知不見也前中有二初明二乘不盡二出不盡之相言何以故至亦不作證者述曰問云有何所以唯如來能斷二乘不除耶言無漏不盡不得自在者古解漏有二謂煩惱漏二過失漏二乘但斷煩惱漏盡作所作已辦以不能滅過失漏名無彼漏不盡故不得自在也今基法師云不然無漏者只道淨故名無漏無漏有二若生空無漏二乘證得以不得法空無漏名證無漏不盡故不得自在亦不作證也問何者是無漏不盡耶言無漏不盡者即是無明住地者述曰第二出不盡相由二乘不斷無明住地故便證無漏不盡謂法空智是也第二出二乘不知等中有四初明斷過有餘二以不斷故下明三事有餘三以成就下明知諦有餘四是名得少分下明所得涅槃有餘也前中有二初明三乘聖人為無明所覆遂無知覺二明不究竟言世尊至不知不覺者述曰明三乘聖人為覆無知覺也此二乘人為未斷無明住地覆法空理障法空智於彼彼真俗境中不知不覺最後身菩薩者或是化相中王宮生菩薩未至妙覺地為微細者著礙所覆障未得知覺或是實相菩薩未至金剛道已還不斷二障種習解脫道果未起已來為障所覆亦無知覺無知覺者二乘未得法空中根本者智故不知無後得智故不覺亦約盡智無生智解也若最後身菩薩未得佛地真淨圓滿本後二智名不知覺也亦約如理如量二智解也言以不知見至究竟者述曰第二明不究竟也若二乘人未回心未斷過地不滿不斷所應斷法執終不究竟證得大果若最後身菩薩未到妙覺地始等覺地終猶有餘染未名圓證樂果名不究竟也上雖有二名斷過有餘也言以不斷故至一切功德者述曰第二三事有餘也言三事者即涅槃經中三事涅槃故然解三事有三義一唯約無為真如二唯約有為智慧三通約心境也言約無為真如者此真如上性有三德為煩惱覆不顯非是新得修道證三時假名新淨如虗空除雲作淨也即此真如在纏名如來藏出纏與衆生為依名為法身離障縛邊名為解脫身性能覺照與覺知為依名摩訶般若身此即體一義分有三也言約有為智慧者即此智慧雖是修生然種本有要仰勳習四智方成為法莊嚴之相依處體依聚義總得名身稱法身也昔為無知覆而礙解今既斷已如蓮華開永無障染名解脫身智慧本來性能覺了此已圓滿具德無邊名為般若也言通約心境者此三事中法身唯攝真如性凝非假所立般若但取智慧動照要藉修生解脫離縛得名境智二俱成有若言唯真三事二乘何不證修若道獨智稱三慧照寧無真境如來二俱平等離障顯淨既云通二合得三身於理教當見矣二乘雖證真如與佛無別但無利他業三義不顯與佛有異下此文中言解脫者解脫身言清淨者即法身言功德者即般若此三中一一皆初句稱與後句感應也言以成就至有餘功德故者述曰明知諦有餘於中有二初牒前三事生起後文二正明知諦此即初也為於三事未得雖昔證理於真諦猶不具足言知有餘苦至修有餘道者述曰正明知諦也然諦有三義一苦等二名諦是已實也三名實一真法界也然凡夫但知苦等不知諦是實二乘知苦等及諦而不知實菩薩於中三皆有知故今二乘為不知四諦之實理皆名有餘也如涅槃經辨或可約有作無作八諦解亦得言是名少分至向涅槃界述曰第四明所得涅槃有餘也約四種涅槃無第四故名作有餘是得涅槃之分無為理故向涅槃界界者因也是向涅槃之不因起菩提之大體故於第二明如來得四智中有二初明佛所得之爾所以以佛成就一切功德故得二如來應等正師子吼大正明佛得前中有四翻前二乘四種有餘得四無餘經文前却不次前二乘中初斷過二事三知諦四明無今此文中初知諦二涅槃三三事四斷過問何故作次不同然答是如來隨自意語不可准釋也言若知一切苦至修一切道者述曰明知諦無餘翻前三有作無作二種皆名四無餘又於苦等諦一實三事中俱證悟盡名無餘也於第二明涅槃中有二初明佛自利德二於無覆護下明利他德也翻第四言於無常壞世間至常住涅槃界者述曰明自利德也凡世間有二謂言器世間有情世間如來於有情世間自斷障染於器世間為他分所持於中但見清淨言無常壞世間者器世間也然此為三灾所壞四相所遷隨業感生起名無常壞也言無常病世間者有情世間也有情隨業生死漂流四百四病常不離身非情非故三乘因衆皆有此病粗細有異如來於二世間中證得常住圓寂妙理名涅槃界也言於無覆至為依者述曰第二明利他德也言無覆世間者是有情世間皆未證無漏所收名無覆護如來能為護世言無依世間者是器世間既有成住壞空無久依處如來於彼為依令成淨土也於第三明三事中有三初總明三事二智慧等下別明三是故下結也翻前第二也言何以故至故得涅槃述曰總明也有二初徵次釋言法無優劣者如來所成名優優者長也滿也二乘所證名劣劣者弱也半也此一法言有通四種理教行果今既會如果同歸一乘四種俱會如法華經中云三車誘引果同設異此即會果也一雨普潤教同機異此即會教也涅槃經中三獸渡河理同證異此即會理也此經上文六處大因行同修異此即會行也教理行果皆同一味即無優劣若悟此理故得涅槃也言智慧等至得涅槃者述曰第二別明三事也等者平等無半滿絶大小混師資離頓漸名為平等也言智慧等者摩訶般若也言解脫等者解脫身也言清淨者法身也言是故涅槃至謂解脫味者述曰第三結成三味也一味者法身也味者般若也解脫身也味者資身之用如世間味資壽命出世之味益慧命故此三味即三事涅槃如來悟知引二乘證於第四斷無餘翻前第一中有二初返釋如來不斷之失二世尊於此起煩惱下順解斷得前返中有三初以淨顯前由不斷無明住地不得三事二何以故下若不斷無明住地不得恆沙佛法三是故無明住地積集下由不斷無明住地遂起恆沙煩惱言世尊若無相住地至謂明解脫味者述曰以後證前也但為不斷無明住地故三事理皆不證既不證三事即是斷過有餘既證三事明知斷過無餘也於第二不得恆沙佛法中有二初明不斷不究竟二正明不得恆沙佛法言何以故至不究竟者述曰明不斷不究竟也但為無明住地不空故過恆沙所應斷法皆不斷不究竟也言過恆沙等至應證不證者述曰正明不得佛法也但為過恆沙等所應斷法無明不斷故遂於得中道諦應得而不得滅諦應證而不證便為大失於第三由無明生一切煩惱中有三初明無明能生一切煩惱二如是過恆沙下明一切煩惱依無明立三一切上煩惱起下雙結之前中有二解一云合有十三句文分之為二初二是總十一是別別中有二前七能覆因上後四能不得果上前七中有二初一能覆菩提心下有六覆菩薩行中止是定初觀是慧始禪與正受是定行成方便與智是慧行成於果中初一是總後三是別也二云於十三句中合為五對初二名見修對二有三句三學對三有二句名界地對四有三句名因果對五有三句名有為無為對今約後解名為五段也言是故至上煩惱者述曰第三句見修對也言修道斷煩惱俱生也上煩惱者見惑分別起以亦別助故名為上故言彼生心上至觀上煩惱者述曰第二有三句名三學對也問止者名定觀故稱慧其理可知何以故言心行為戒耶答二乘持戒但防七支唯色非通菩薩持戒具受十支雖通色心意不防色但護其心故涅槃經云淨壞聞有女人環命菩薩起念即是犯心故非關色又云菩薩有戒雖非形色而可護持雖無解體善修方便可得具足以此文證故心名戒然此三以下非是煩惱為戒緣起從境得名即分三種如滅道諦也言禪上至受上煩惱者述曰第三有二句名界地對也禪謂四禪即是色界正受謂無色界緣此起惑乃分二也言方便上至果上煩惱者述曰第四有三句因果對也方便謂加行智者謂因中所有智此二是因後名也言得上至無畏上煩惱者述曰第五有三果句有為無為對得謂證得無為之得力謂十力無畏謂四無所畏此二名有為也言如是至之所建立者述曰第二明一切煩惱皆依無明得立也此四住地如來能除起時依無明住地方得生矣如天言一切上至緣無明住地者述曰第三雙結也言一切上煩惱起者謂四住地若因若緣皆因無明住地而得生長此一皆言通下緣上應云一切煩惱起皆因無明住地皆緣無明住地故於第二順明佛斷得中有三初明由斷無明故恆沙惑隨滅翻前第三如是一切煩惱上煩惱斷下明得恆沙佛法翻前第二三離一切過惡下明三事翻前第一前中有二初將五住地相對辨粗細二正明隨滅前中有二初明四住地是粗二明無明住地是細言世尊於此煩惱至剎那相應者述曰第一明四住地粗也起者現行義剎那者時節義然相應具五義謂時依行緣事即心法具此名相應故今文云於此起煩惱者出能相應心所也剎那心者出所相應心王也剎那相應者合辨相應以具五義故言世尊心不相應無始無明住地者述曰第二明無明住地細也言心不相應義者種子義無緣慮故名不相應也無始者顯無始本際是常起義也無明住地者出體問何故四住地但明現行無明住地中唯明種子耶答有二義一云欲明五住地有粗細相續間斷義起者名曰現行現行不即常起名為間斷粗也心不相應者是種子種子無始恆有名為相續細也二云起四住豈種子何曰得無明恆無現行此是影略說也於第二明隨斷中有三初法說二喻說三合說言世尊若復過至所建立者述曰法說也但四住地一切煩惱現起未斷已來皆依無明住地持建立若准喻合說中此少隨滅但有依生至下當知於喻說中有二初明依生喻二明隨義滅喻也言譬如至建立增長者述曰依生也一切種子喻四住地地者喻無明住地緣有地故一切種子依地生已復依地增長也言若地壞者彼亦隨壞者述曰隨滅也大地為水火風所壞之時萬物種類皆隨地滅所依無故能依不立也於合說中有二初合生二合說中有二初合生二合隨滅言如是至建立增長者述曰合上生也但有生執必有法法為依故自有法執無有生獨行法執故由此四住地皆依無明生也言若無明住地斷者至亦隨斷者述曰合上隨滅也唯十地位中法執已出生執不隨滅要至金剛除即不得言隨無明斷滅然約十地故意心因生種道力時法執皆斷若不合斷何故者留為道欲斷方便受生異於二乘得留名故又約畢竟所說金剛道中四住隨滅也問為要由無明斷四住隨滅為有不由無明斷四住自滅若要由無明者二乘既不斷無明四住應不滅不由無明故滅即不得言皆隨法執滅也答無明本四住末未若斷時皆須依本二乘雖斷唯滅種子習氣未亡無學果中猶有障礙在依附性不調異性不安隱性硬澀無堪住性障生淨土無外清淨若也回心斷無明已習氣隨滅更無餘染由是得言四住隨滅也言如是一切至一切智見者述曰第二得恆沙佛法也一切諸法者謂真俗法也通達無礙者根本智也一切智見者後得智也又解通達無礙者人法二空智也一切智見者謂二根本智故一切見者謂二後得智故二乘不得此名有餘也言離一切過惡至自在之地者述曰第三明得三事也離一切過惡者解脫身也一得切功德者法身為諸功德之所莊嚴及依故法王法主而得自在者謂般若也謂諸四智緣真故稱王緣俗故稱主皆得自在也登一切法自在之地者總結三事謂如來升妙覺地為法王主也上總明如來得之所以下正明佛得於中有三初歎佛德用二正明得四種無餘之智三結佛得之所由言如來至正師子吼者述曰歎德也德中有二初內自利德二外利他德言如來應等正覺者內自德也有十號前三號三德所收如來者斷德也應等者恩德也正覺者智德也即是經中多陀阿伽等義故廣釋名義如常正師子吼者外利德也由如來具梵音聲相利益群品為師子吼故言我生已盡至不受後有者述曰第二正明佛德四智也明佛具證八聖諦盡不同二乘也言是故世尊至一向記說者述曰結也非了義非不了義但說一向非餘三記不同二乘也於第四明集諦智中有二初總標不受後有智第二別顯言世尊不受後有智有二種者述曰總也有二解一云言二種智者謂半滿二智也如來具得二故名得不受後有智圓二乘但得半智所以四智不究竟也二云二智者謂分段變易二智也如來具斷二生死無證四智究竟二乘但斷分段四智不圓滿也別顯中有二初明佛得以智圓二明二乘不得前中有二初明如來具得三事智故圓滿第二結成前中有三初法身二般若三解脫也言謂如來至不思議法身者述曰明降魔成道證得法身伏魔有三謂實權破如法華抄中述也言於一切爾炎地至無所得地者述曰明般若也爾炎翻為境界亦名智母能生智故能於真俗二境之中無礙自在至不退地名無所得地所作已辦故言十力勇猛至無畏之地者述曰解脫德圓滿也雖有此三合為第一也言一切爾炎至師子吼者述曰第二總結成也明如來得此智究竟也明二乘不得中有二初明得離苦第二明得蘇息處言世尊阿羅漢至不受死苦者述曰明離苦也言世尊至蘇息處涅槃地者述曰明得蘇息處上來雖有多文廣釋怖畏中第一正明怖畏訖自下第二攝入一乘中有二初談不定種姓得入一乘第二何以故下正明攝入前中有二初談本性二明用言世尊彼先所得地至不由於他者述曰明本性也彼先所得地者謂住二乘因果之位地也不愚於法者謂聲聞有二若定姓總名愚法聞說大乘生怖畏故二若不定種姓名不愚法一聞大乘即便回趣求一乘故言不由於他者謂身中舊有菩薩種姓性自仁賢非由他人有所作故言亦自知得有餘地至三菩提者述曰明用也有一二乘證得自道滿已得與此執今得離苦圓滿不求菩提也有一二乘雖證小位自知已得有餘之地當有所作及意能往無上涅槃言亦者何以不愚於法亦能自知證有餘地捨而起大也於第二正明攝入中有二初總攝入二得一乘者下別攝入前中有二初徵後釋也言何以故者述曰徵也問意云有何所以二乘證得自乘而非究竟耶言聲聞至即是一乘者述曰外徵也泛明乘有三對一小大對二因果對三一三對言大乘對小故言佛乘形因故言一乘待三故約此三對以明攝入小乘入大乘因乘入佛乘三乘入一乘者名總明攝入也於別明攝入中有五初入菩提二入涅槃三入法身四入一乘五結成無邊不斷言得一乘者至三菩提者述曰入菩提也言阿耨至涅槃界者述曰入涅槃也言涅槃界至如來法身者述曰入法身也言得究竟法身至一乘者述曰入一乘也言無異如來至無邊不斷者述曰結歸不斷將如來法身辨無異相即名為究竟即是一乘究竟名無邊不斷也於第二廣釋依章中有二初正明歸依二若如來隨彼意欲下明攝入一乘前中有二初明別歸依二明同歸依前中有二初明歸依佛二法者已下歸依法僧前中有二初歸依三身二無限大悲下結戒歸依前中有三即三身也言世尊至時住者述曰第一明法身也真體凝然無有限齊遍周法界無處不在何語限齊言如來至後際等住者述曰第二受用身也受用身有二謂自他故若自受用四智為體亦遍法界同前無限若他受用唯化色形而無慮用隨機起化三際往來名後際等住今文舉十中三德言後際者是他受用也言如來至安慰世間者述曰第三明變化身也然變化身依法身亦今同舉法以證化身始能安慰言如來無限齊者舉法身也言大悲亦無限齊者是化身也談如來德化相具大慈悲今此獨明悲者偏明拔苦勝故由法身無限明知能依化身大悲亦無限齊為起大悲故遂能安愍世間也第二結中有二初別結二總別中有二初結化身二結法受二身言無限大悲至是名善說如來者述曰結化也即此化有二用一能行悲二能安慰此二俱無限齊為法身故如是說者是名善說也問如維摩經云或有恐怖或歡喜者名為化身故此化身安怖不定一向受樂名受用身若唯行大悲安慰情敬便是受用何名變化答談聖化身通有歡怖今且偏舉拔苦安恐濫地上他受用身據世間稱也言無盡法常住者結法身也言一切世間之所歸者結受用身也能如是說者亦名善說如來也言是故至正覺也者述曰第二總結三身也言於未度世間無依世間者化身也未度者外凡位無依者內凡位言與後際等作無盡歸依者受用身也言常住歸依者法身也謂已上出所歸依法體故上明歸依佛訖於歸依法僧二寶中有二初出法僧二體二明歸依非真非令言法者至三乘衆者述曰第二出法僧體也言法者即是說一乘道道者三乘之法是大乘之方便也僧者是三乘衆者四果四向出獨行十地三僧俱僧寶攝出二歸依體也明歸依非中有二初總標舉宗歸依二者不二何以故下釋非所以言此二歸依至少分歸依者述曰舉宗也若別歸法僧非究竟不令猶有上故於釋非中有三初徵次釋後結也言何以故者述曰初徵也有何所以法僧二歸名少分耶下釋中有二初釋法二釋僧言說一乘道法至一乘法事者述曰釋法也若說一乘道法能得法身法身上更無說有一乘法中即如來法身名一乘法然二乘法上即更有一乘法事故非究竟也言三乘衆者至菩提者述曰釋僧若三乘衆障習未盡是有恐怖歸依若能求出修學大因即是向菩提分是究竟也此二皆舉實歸依及證二乘是權也言是故至是有限依者述曰第三結二歸是有限無限問直明二乘非實歸依便足何須舉實法僧明權耶答舉權顯實故釋今知權實故又明權歸不真故須舉實也問曰何故佛中但明真歸法僧便二耶答理實俱齊是並有權實然佛中即真佛大悲之因不須破遣法僧二內有僞有真所以雙舉問一乘說有三十四心次第成佛王宮樹下即是真身將此為依何必究竟如何內不舉破之答佛中權實三身俱是歸依然二乘不了迷假愚權執為真佛但歸依者是實歸處由是前文具明三身法僧二寶有真實真權修迷假化真假真假俱非究竟為是法僧二中舉權顯實也上明別歸訖下明同歸同歸者一體三寶於真如上說三義故故涅槃經云若能計三寶常住真諦此則是諸佛最真誓願於中有三初出能歸依人依別法僧二非此二歸下言若有衆生至是二歸依者述曰第二出歸依人也言若有衆生如來調伏者外凡位人也言歸依如來者地前位也得法津澤者十地內也生信樂心者雙結上二以信通漏無漏故又解云從若有衆生歸依如來者十信已前得法津澤者地前菩薩非得初地無漏法水之津澤未具正潤故言生信樂心者初地以上證四不壞信心也此人若別歸法僧者名別歸依也於釋別彰同中有初摧別歸同是二何以故下以同即別非有有二初摧別即非令歸第一二摧別非令歸究竟也言非此二歸依至是歸依如來者述曰令歸第一也解云非此二歸依即是歸依第一義諦是歸依如來故言此二歸依至如來者述曰令歸究竟也若能歸依第一義者即是究竟歸依如來故言何以故至即三歸依者述曰以同即別非也如來者即攝二歸依義義歸與如來道身無異如來者即三歸依故上明別非同是訖下舉如來為證也言何以故至獅子吼說者述曰以如來說一乘道四無所畏師子吼說談一乘道同體三歸深為可信別歸法非竟也上明歸依訖下辨攝入於中有二初明權二辨實言若如來至無有三乘者述曰明權也即法華經中破三歸一但有攝入一乘即是如來隨彼意欲而方便說非真了義名為權說也言三乘者至即第一義乘者述曰明實也今此經中具明出生攝入一乘真諦了義不隨他語名真說故若法華經中說一乘是實三乘稱此經中四乘是實說一乘稱權以有無種姓定姓二乘故各別說說人名實若隱此種姓總說一乘一乘是權其攝大乘論為引攝一類等欲破不定種姓令歸大乘非定姓故上有五章明行果二訖下有八章明教理兩種理外無教約理以明聖教故於無邊聖諦中有二初釋無邊二世尊聖者下釋聖諦前中有五對初行因頓漸對二修行半滿對三出戒令缺對四證理同分對五得果勝劣對前中有二初明因漸非頓二行八因頓非漸前中有二初約人標初智斷諸地非上二釋初智知四諦相也言世尊至斷諸住地者述曰約人標初智也二乘人於苦法忍初觀四諦之斷諸住地不以無作之智斷無明地所以非上也言以一智四至此四法義者述曰斷相也言以一智四者謂是一有作智分為四種也言斷知功德作證者四智然名斷者斷集知者知苦功德者修道作證者滅諦也言亦善以下不但能知四智之理亦能善知此四法之與義也上明漸下辨頓頓中有三初反釋上上智無漸至故云順釋頓智名上上也言世尊至及四緣漸至者述曰反釋也出世間上上者謂是頓悟無作智故若有作智即有漸至之義此出世間智無有四智及緣漸至之理也言無漸至上上智者述曰順釋也若無有四智緣漸至法者是出世上上無作之智由此故名為頓智也上名行因頓漸對故下明修行半滿對於中有二初順終滿二反始半言世尊至第一義智者述曰反辨知半也非二乘不出無明地以初智名第一義可得由此反證二乘初智名半也於出惑全缺對中有三初明出惑缺二辨出惑全言世尊以無二至斷諸住起者述曰明缺也二乘以無二聖諦智但以有作一智斷諸四住地名出惑不盡稱缺也言世尊如來至煩惱藏者述曰明全也如來以不思議空智出一切煩惱四住地藏稱全非二乘境界故言世尊若壞至第一義智者述曰第四證理同分對也如來能壞五住地煩惱藏證理既圓名究竟第一智二乘但斷四住不滅其藏證理分非究竟非第一義智也言初聖諦智至三菩提智者述曰第五明得果勝劣對也初聖諦智非究竟智明劣也向三菩提智是究竟智名勝果也上明無邊訖下辨出諦於中有二初明聖及諦不在二乘二世尊此諦下明聖及諦唯在如來前中有二初明聖義非二乘義二聖諦者下明諦非二乘諦言世尊聖義者至故名之為聖者述曰明聖非二乘也初先舉聖義非二乘得有量少分釋成小聖即二乘人但成就有量少分功德名之為聖不名大聖以未得無量全分功德故明聖義非二乘義也言聖諦者至緣覺功德者述曰明諦非二乘也今言聖諦者非二乘所得諦亦彼功德要無作諦始名聖諦故於明聖諦在如來中有三初明聖諦如來始覺二明如來能說三歎聖諦深義上二乘中具明聖及諦下如來中亦合明二唯辨聖諦者以如來即是大聖故言世尊至初始覺知者述曰第一明如來始覺也然此聖諦如來大師尚始覺知反顯二乘元來不得也言然後至是故名聖諦者述曰顯如來能說也佛證無作始覺知也復能無倒為彼世間無明㲉藏愚癡衆生開現演說故名聖諦也於歎聖諦中有二初果歎甚深二明所智能信也言聖諦者說甚深義者述曰牒歎也言微細難知至所不能信者述曰釋成甚深辨知不信也即此聖諦義既甚深微細難知非心慮境是智者所知世間所不能信若二乘少分信今菩薩少分知全分能信佛即圓滿故知聖諦甚深也於如來藏章中有四初牒前甚深說如來之藏以生後二明非二乘知三歎甚深四明不信言何以故至如來之藏者述曰牒前也初徵後解言如來藏者至緣覺所知者述曰此究是理唯如來知十地尚不能知何況二乘耶言如來藏處至聖諦亦甚深者述曰歎甚深也將境即知二種甚深依如來藏處說有聖諦之義處既甚深故知聖諦亦甚深也言微細難知至所不能信者述曰第四聖者悉信世間不信以理法甚深卒難生信也然如來藏有四種依楞伽經有二謂阿梨耶識名空如來藏具足無漏薰習名不空如來藏也依此經有二謂諸煩惱覆真如性二真如理性若本識含無漏種子後時生報身佛若煩惱所覆真理當顯得法身也本識藏故所捨也煩惱藏故所出也聞薰藏故所生真如藏故所顯也於法身中有三初將因即果二於說如來藏下合因果二即二諦三世尊過於恆沙不離下釋因果相異言若於無量煩惱藏至亦無疑惑者述曰將因即果也若衆生自知身中具有佛性解如來藏因既如是於如來法身亦不生疑惑也於第二中有三初總舉因果即二諦第二如是難知下別釋二諦第三如是八聖諦下結成四言於說如來藏如來法身至說二聖諦者述曰此初也若有衆生於藏法身心得決定不疑者便能信解說二諦義別釋二諦中有二初總標二問答解釋言如是難解者謂說二聖諦義者述曰總標言何等說為二聖諦義者述曰問答解釋有二初問起二答此初也言謂說作聖諦義說無作聖諦義者述曰下答也有二初總答二別答此初也別答總標也言說作聖諦義者是說有量至四聖諦義者述曰別答也有二初答有作二答無作有作中有三初立宗二釋三結此立宗也有作聖諦也問何故此有無有八瑜伽安立有四非安唯一成唯識論世俗勝義各四耶答瑜伽據別體實性證而知者故說非安唯一安立有四唯識據別法相形有勝有劣故成各四此經據約人說法有無各四作是生義起滅之用也安立通理事二門有作唯在聖事也量謂限量二乘劣智且知有量不知無量何者耶言何以故非因他能至修一切道者述曰釋也二乘要他說各四因他始能立知苦斷集證滅修道菩薩非由他能作四諦斷也言是故世尊至及無餘者述曰結證也如來依此說有二死二槃分段生死因緣俱有為故名有為生死變易生死若據真理名無為變化即有為若據無漏法不為業煩惱為故亦為名無為即變易得名無為生死從助因說因既有二得果非一若煩惱障盡所得真理名為有餘具出一切二障盡名曰無餘也答無作中有二初立宗明無作義二釋所以言說無作聖諦義者至四聖諦義者述曰立宗也法無邊際也名為無量也言何以故至修一切受滅道者述曰釋所以也由具出二障離二生死修二智道證不住等理所以不無量也於第三結八成四中有二初牒八不越於四二如是四無作下釋云權實明盡不盡言如是八聖諦如來說四聖諦者述曰第一牒成四也理實有其八類攝實遇有四謂苦等也於釋中有二初牒四無作雙苦二乘如來明究竟二別釋二義如來相言如是四無作聖諦義至辟支佛事究竟者述曰第一雙分也無作無量道理深遠唯佛淨土是究竟事非二乘事為究竟此即宗下釋所以有二初釋二乘非究竟二釋如來是究竟言何以故非下中上法得涅槃者述曰自釋二乘也二乘以欲界智為下色界智名中無色名上既起三界出智唯能證有作四聖諦不能得彼無作四聖諦故知非究竟下釋如來中有三初釋如來是究竟立宗二出無作之相三釋疑言何以故如來應等正覺至事究竟者述曰立宗也二乘不爾唯佛而為究竟也言以一切如來應等正覺至苦滅作證者述曰第二出無作相也以如來正覺不但知現在亦知未苦三障等總出修證盡四諦文即為四所以如來事究竟言世尊非壞法故名為苦滅者述曰第三釋疑有二初略標釋疑二所以言下出相除疑此初也亦可初明事滅二明理滅也恐有人疑所苦壞無所得之理今滅者非是壞法名作苦滅總也言所言苦滅者至離一切煩惱藏者述曰第二出相除疑也本有無始無成故無作無為故無起無盡更無遷動名常住在纏不染名自性清淨能除諸惑名離一切煩惱藏也上來第二釋因果即二諦訖自下第三明因果相別初果相後因相言世尊過於恆沙至如來法身者述曰明果也由此真理不離成就名為法身也言世尊如是如來至名如來藏者述曰明因也未離煩惱名為藏也自下有空義覆真實中釋前如來藏於中有二初總標立宗明有二種如來藏非未滿者所知第二別釋前中有二初立二宗二非化所知言世尊如來藏智是如來空智者述曰古來相傳以實空為如來藏者非也此是清辨等宗然梵本有二名若若多名為空空者無也若瞬若多名空性性者有也今言空者從空所顯理故名空據體有也此明如來智故不被覆言世尊如來藏者至本所不得者述曰第二非他所知明無智故被覆此如來藏非阿羅漢辟支佛大力菩薩本所不見不得十地菩薩猶不能了盡況二乘耶故名不見不得也此上標宗也下釋中有二初標藏二第二解不見不得前中有三初標藏二二別釋二藏三舉能信人言世尊有二種如來藏空智者述曰標有二義藏謂空理智也釋中有二初釋空二解不空言世尊空如來藏至一切煩惱者述曰解空也四種如來藏中能覆隱真理名空如來藏於金剛道後此方出故言世尊不空如來藏至不可思議佛法者述曰解不空也此真理為煩惱所覆不離脫等諸佛法故當得法身名不空如來藏也此下第二舉能信人結也言世尊此二空智至能信如來者述曰此二種藏皆有二義大地菩薩能信解如來也何故但說聲聞能信不論獨覺菩薩耶答曰菩薩能信不說自成聲聞能信於理為妙一是回心人二不愚法三如瑜伽論廣慧聲聞能信其獨覺者一為不見佛何能信二亦於聲聞中上解二藏訖自下解不見不得中有三初明二乘唯於四不處二結也三舉佛能知反顯二乘不知言一切阿羅漢至倒境界轉者述曰由二乘等唯常樂我淨四處轉為是不見不得如來藏二種也言是故至本所不得者述曰結成前義言一切苦滅至一切滅苦道者述曰第三舉佛知顯二乘不知所由唯有如來滅一切苦二生死盡證一切滅苦道二乘不爾故不見不得也於一諦章中有二初釋一諦義二是滅過一切下解一諦深妙此一諦一依釋前法身身者依止義故成唯識第十卷云體依聚義總說名身法謂能持自性非假所立真如能與恆沙功德為依止處名為法身今一諦者一謂真理更無差別名為一也諦者實也有即言有無即言無今非此義唯實名諦即是身也於前中有二初總標第二釋所以言世尊此四聖諦至一是常者述曰若有漏無漏對苦集有漏滅道通無漏若有無為對有多義若非為業煩惱所為名無為滅道俱名無為故前文無為生死據無漏煩惱無漏助因說若據性墮起盡衆緣所生名有為非如此名無為者即三諦俱有為唯滅是無為今此真如具二義故名曰無為一性不起盡二非業所為也由此一唯常也於釋中有二初釋三是無常二釋擇滅是常前中有二初釋後結釋中有二知初明有為等三義二明非依言何以故三諦入中為相至是虗妄法者述曰有何所以三諦是有為耶以三入有為相故有為即無常性有起盡無常者無彼常有常無名曰無常真如有而恆有故是常有我今三生故簡本無今有名生也兔角無而常無故是常無今三滅而簡故本有今無故此三雙無彼常有常無故名曰無常也若無常者即是虗妄虗妄者顛倒即苦集二可名虗妄豈有道諦亦是妄耶以非倒故但說三界心心所是虗妄分別不言無漏也答今與二諦合為文故總名虗妄據實道諦虗而非妄也此上三義訖下辨非依也言虗妄法者非諦非常非依者述曰若有無別定俱三名諦若性凝名諦餘三即由非非諦不常不常故非是為依之處所以之非依言是故至非常非依者述曰第二總結三明非依攝入無常也於釋一滅中有二初釋次結前中有二初一滅離有為等三義二明是依言一苦滅諦至非虗妄法者述曰此真如理離有二初一滅離有為相非生等所遷離彼相是常常故非虗妄也言非虗妄者至是依者依述曰二明依也此一諦既非虗妄是諦故是常故可依三乘究竟皆趣依彼故言是故滅諦至不思議者述曰能成一常也於釋一諦深妙中有二初略解二凡夫下廣解前中有三初法說二舉喻第三合言是滅諦至智慧境界者述曰法說然此真理凡夫不能識二乘所不知細境粗智不能緣故言譬如生盲至不見日輪者述曰喻說也如世間人若生盲者離有衆色顯現於前而自無目不能得見復有七日嬰兒眼睛猶弱縱覩日色為耀石鑒但為目眼是初非圓日滅也言苦滅諦者至智慧境界述曰合法也凡夫無始已來不覺喻生盲者不覩色二乘雖證半道猶嬰兒者非見日色恆而不滅有盲俗者不見苦滅常而無沒水聖所以良由至理甚深無識淺智而不悟也於廣釋中有二初略標非凡夫二乘境界開二章也二別顯所由釋二別章言凡夫識者至則是清淨者述曰凡夫而二見所弊顛倒不見真如二乘雖出兩邪智淺不能觀達為此故非彼境也由二章也於別釋中有二初釋凡夫二見章二釋二乘清淨智章也於前中有四初明邊見依我見生二出二見相收三釋二見起之所由四解二見作用也言邊見者至所謂常見斷見者述曰第一也凡夫之人於五受陰妄想計著執為身見依此身見計之有常有斷名為邊見故知邊依我見起也問此中欲解凡夫為惡見所弊不見滅理何故但說二見豈餘三見不覆理耶答論實五見俱能覆真此中但據根本故說身見身見即起邊見為此且舉二也問邊見依身起能依但二二取答二取起時不定或通餘此不說邊見若起定依身為此但言身邊二也言見諸行無常是斷見至作如是見者述曰第二也遷流造作名之為行此行前盡後生二趣相接名曰無常愚夫不了不覩未來生相續遂計為斷名為斷見心心所法微細難知本識一類常無改易不了是識便計為我此我恆通能作業受果無有生滅妄執為涅槃常住不滅即名為常見七由妄想見故作如是見也言於身諸根至妄想見故者述曰第三明起二見所由有二初斷二常此斷見也於身諸根者謂於五根四大種次起分別思惟度見此根相續斷壞於後不見遂生斷相謂或身滅起中見也言於心相續至妄想見故者述曰明常見於心相續者謂於心心所法上起或可是本識相續不斷容他執故愚闡者謂無明覆心不達本識或一切心法非常非我也不知剎那間者然心心法念念謝滅為餘境易達時不定若准此說間言上文於心者通一切心法非唯第八以此中說餘境間故又可間又間者未必為餘境所隔名間但是念念前後相續剎那不同名之為間上文於心者唯是第八故攝論第一云何容分別此度為我心第八始從無始終至金剛行相一類無改易故故知今執為常謂是涅槃不離第八也意識境界者謂諸心法皆第六緣名意識境若取第八為心者即意識言通六七兩識意及意識故類形業道相似不違此法起常見故妄想生也言此妄想見至不淨淨想者述曰第四明二見作用也若常見於彼心法之義昔非涅槃今妄計為涅槃趣於上名若過作異分別起常見若斷見於身根彼義未來實有不達至處深計為斷情慮不到名不及作異分別起斷見也由此二見有情於五受陰起常樂我淨非我等上起也於明二乘清淨智中有三初明二乘不見二明隨順者能見三舉二乘極果顯初業當得也言一切阿羅漢至本所不見者述曰第一明二業智識於一切若總別若真俗若理若虗實等境及如來法身本來不聞不見也於第二明隨順中有二初總標二釋所以言或有衆生至是名正見者述曰若有衆生雖是凡夫有大乘種姓不愚於法聞佛所說常等四德即便隨信言不虗妄名為正見也下釋所以中有三初明起四不倒二結名正見三名真佛子言何以故至淨波羅蜜者述曰於四德中能深悟解波羅蜜到彼岸義信真理是常是樂是我是淨不起於無常等妄起常等如是解者名為正見此中或破凡夫四倒二乘四倒或約煩惱業生四障或約闡提不信等四障具說亦得也言於佛法身至是名正見者述曰第二結名正見也言正見者至得法餘財者述曰第三明真佛子有三釋若有無漏法爾種子樂大乘上果如來攝受名真佛子也從佛口生名聞慧從正法生思慧從法化生謂修慧於七聖財未能證盡已得少分名得法餘財也二是佛子者三乘不定性人其性定故如來攝受名真佛子從佛口生聲聞也從正法生緣覺也從法化生大乘也法財各自隨分證得也三真佛子如前解言從佛口生謂初發心十信也從正法生十信解十行十回向也從法化生謂四善根位中得法餘財謂至見道已去也於第三舉二乘極果顯初業當得於中有二初舉極果定性者不能況初業人二釋初當業所以前中有二初單舉二極果二相例也言世尊淨智者至波羅蜜者述曰波羅蜜名到彼岸故是二乘極果也言此淨智者至況四智依智者述曰第二相例也二乘極果淨智尚不知一苦滅諦況二乘初學依四諦智之人能了耶言何以故至說四依者述曰下釋所以二乘初業者謂二乘人創回心向大乘時名為初業以不愚於法然於彼義中無間道當覺解脫道當得也為彼故世尊說四依者此是反顯世尊為彼決定種姓愚法之人說四智及顯初業之人不愚於法當覺當得世尊不為說四依智也言或可如是反顯此文即解不定性人未回心時世尊為說四依智也於一切依中有二初明安立非安立二諦依義二世尊生死者下明如來藏即生死涅槃為迷悟依也前中有二初明安立非安立若依詮顯諦真如滅諦收安立也若廢詮談旨真如非滅攝非安立也言世尊此四依者是世間者述曰明安立諦也若據性是有漏名世間者即無漏名出世若據有此相狀名世間安立四諦俱名為世間法也言世尊一依者至所謂滅諦者述曰明非安立諦也謂滅諦更無差別名一諸法之止住處名依於一切依中此最上第一義依不可思議也於第二明迷悟依中有二初迷依二世尊若無下明悟依迷中有二初本際依二世尊生死生死下明不一不異前中有二初明生依二明依持依言世尊生死者至本際不可知者述曰生依也生死妄法由迷故生依真而起如來藏既如下無始本際不可知如滿月輪故至無始不可得也言世尊有如來藏故至是名善說者述曰依持如波依水波無有水有波波水不異我今生死依於真如由理故能持生死也此解依訖自下第二解不異不一於中有二初釋二是故下結前中有二初明不異二明不一前中有二初解生死名二正明不異也言世尊生死生死者至是名生死者述曰為生死過多故其聖言生死於異領納受果為先本識執受諸根名受根也若諸受根沒不受名為死若次第受根起名生也又云諸受根彼次第不受名死若諸受根次第起名生也若言不受根名生豈有一根不為本識執受耶應問法師言世尊生死者至有死有生者述曰第二明不異然此二法依如起離本無末虗幻所生生死法今如來藏猶波即水但由世間假立說故道有生死二名窮其實也真外無妄言說有故故知不異也解不一中有二初解生死二明不一言死者諸根壞生者新諸根起者述曰諸根壞已名死諸根新起名生故說無常有生滅也言非如來藏有生有死至常住不變者述曰如來藏者性也凝然永離有為等相但妄有生死二非如來藏有此二法也若將如來藏一向一者豈如來藏亦有生死故知不可定一定異故大乘宗一切諸法不異不一也自下結結中有三初總結如來藏是依等二出所依持法體義三舉不能為依外顯出能為依法言是故如來藏至是建立者述曰如來藏生死之依能持生死生死妄法由此建立建立者施設造作義談是本故也言世尊不離不斷至佛法者述曰第二出所依法體真如常一故曰不離非妄可染名為不斷無為故名不脫一類故名不異非一識議所得名不思議佛法也言世尊斷脫異外至是如來藏者述曰第三生死妄謂是斷是脫是異此二外別有一法不斷解等故真如理性體為依持建立者是如來藏也於明悟依中有二初明無藏不能二明有藏即能前中有二初標二釋言世尊若無如來藏者至樂求涅槃者述曰若無種姓有情無佛性故常為無明所覆究竟不能厭苦欣求涅槃或可以無慧解不能照了簡擇是非亦不能也言何以至樂求涅槃述曰釋也由因中有眼等六識果上心法智佛地智強而識劣但以心法智為名因中識勝而智劣乃據六識以為因若因對果應有亦以果形因因應心智各據一義亦不相違由此七法剎那不住念念不種為是不能厭苦樂求涅槃也言世尊如來藏者至樂求涅槃者述曰第二明有藏即能以如來藏本來無際不生不滅由是能厭苦樂求涅槃也於顛倒章中有二初明非四執所緣二明非三類有情境言世尊如來藏至非命非人者述曰此非我等執如唯識抄說也言如來藏者至非其境界者述曰外道異生不達真俗二理迷真執事人我遂生名墮身見衆生人執也二乘雖斷我愚而於諸法執有法體名顛倒衆生也如執法也清辨等類堅執空理撥無實有真亦無名空亂意衆生如撥無四塵也於自性清淨章中有二初勝鬘自說二如來述贊前中有二初略明清淨義二何以故下廣辨清淨等義前略中有四初明自性清淨二明其用深三下情不測四唯佛能知言世尊至自性清淨藏述曰明自性清淨也有四藏一法界藏通非情故二法身藏唯情所收故三出世間藏出纏也四清淨藏在纏也言此自性至上煩惱所染述曰第二彰其用深也性雖本淨而為客塵所汙故言不思議者述曰第三下情不測也言如來境界者述曰第四唯佛能知也上略明四義訖自下廣辨亦有其四如次即是言何以故至而能得染心者述曰解第一也言剎那善心者謂無垢如也即此二心性非煩惱故言觸者和合一味義此心與煩惱既不和合一味何得說有染心耶心者真實義謂真如也言世尊至煩惱染心者述曰解第二也雖復性淨然為五住地之所染也言自性清淨至難可了知者述曰解第三也既有情淨染依二名實難了也言唯佛世尊至如實知見者述曰解第四也於中有十解如樞要說第二如來述讚中有二初內心隨喜二發言述可言勝鬘夫人至佛即隨喜者述曰第一內心隨喜也於發言述可中有二但述可前四義中收二不述前二義易知故也言如是如是至亦難可了知者述曰第一述前第三非下情測也言此二法至唯信佛語者述曰第二述前第四唯佛能知也於如來真子章中有三初明信利益二於我滅後下明歎信利益三信如來者下結信利益也前中有二初略明信者能隨順得究竟二廣解五種觀也言若我弟子至而得究竟者述曰第一略明信也言隨信者謂四十心中也言信增上者謂四善根中也言依明信已者謂初地已去證得四不壞信即能隨順法智而得究竟也四不壞信謂三寶及戒故於廣解五種觀中有二初解五觀二總結也於五種觀中有二初二明染觀第二有三種明淨觀前染中有二初一觀十二入第二觀因果也言隨順法智至觀察業報者述曰第一觀染也言根意者六根也言境界者六塵也因緣無定之身施設恆無定實名意名意解言業者因也言報者果也言觀察阿羅漢眠至聖自在通者述曰第二明觀淨也有三觀分為二初人明淨果後二辨淨因言眠者謂是煩惱羅漢身中此眠既斷即知是無學果今時仰學故又云二乘入滅無餘與眠相似名眠也言心自在樂禪樂者謂得四禪樂在身而常得四禪樂在身而常願樂故言聖自在通者謂觀三乘所得神通也言此五種巧便觀成就者述曰第二總結也言於我滅後至入大乘道因者述曰第二歎信利益也由能具信增上隨法智故雖為彼染然自性淨即是究竟入大乘因也言信如來者至不謗深義者述曰第三結信利益也於明勝鬘師子吼章中有五初勝鬘承力求說二如來聽許三勝鬘正說四說已頭敬佛足五如來述讚也言爾時勝鬘至復說斯義者述曰第一承力求說也言佛言便說者述曰第二如來聽許也今正是時也言第三正說中有二初簡去善人非是所化二諸衆生下偏就惡人以明化益前中復二初舉三種善人二願此諸下總已簡之前中復二初略解二何等以下廣解言勝鬘白佛言至入大乘道者述曰略釋也勝鬘云有三種善人而不須化謂於深義不生誹謗名自離毀傷也能生出善根生大功德復能求無上覺名入大乘道也於廣釋中有二初徵二釋言何等為三者述曰徵起也既言三種善人何者是耶於釋中有三列三種名即為三段初自利第二利他第三於甚深義仰推如來非我境界言謂若善男子至甚深法智者述曰第一自利也於如義中不生誹謗離自毀義名自利也言若善男子至隨順法智者述曰第二利他也能隨順法智廣利衆生名利他也言若善男子至仰推如來者述曰第三仰推佛也此是住分智故言除此諸善男子善女人已者述曰第二結也言諸餘衆生至而調伏之述曰第二約不善人而明化導也言爾時至佛足者述曰第四頭敬佛足也言佛言善哉善哉至能說此義者述曰第五如來述讚也第三是述依行分中有三初如來等還二爾時世尊入祇洹下重述其教三時天帝釋至歡喜奉行大衆奉行也於還中有二初如來還國二入城中下勝鬘入城如來還中有二初世尊還國二時勝鬘下夫人隨含言爾時世尊至還舍衛國者述曰第一如來還國也七多羅者一樹高七仞一仞高七尺總一樹高四十九尺七樹即說三百四十三尺言時勝鬘至具足念佛者述曰第二夫人隨念如來具有三業言還入城中至皆向大乘者述曰第二勝鬘入城也夫人住宮與王城別故說入城於重述中有三初如來告念二應念即至三佛為說以明付屬也言爾時世尊至及念天帝釋者述曰第一告念也言應時至住於佛前者述曰第二應念即至於第三佛為說經付屬中有二初如來說經二始明付屬言爾時世尊至廣說此經者述曰第一說經也於第二付屬中有二初通付屬天帝阿難第二復次憍尸迦下別付屬天帝於通中有二初難益勸持第二時天帝釋白佛下問奉行前中有二初告天帝二復告阿難前中有三初總告勸持二校量勝劣三是故下總結受持言說已至此經者述曰第一總告也於校量中有二初舉餘行大勝二對持經猶尚不及言憍尸迦至波羅者述曰第一舉勝也言若復至為人說者述曰第二方比不及言是故至分別廣說者述曰總結也言復告阿難至四衆廣說者述曰第二告阿難也於第二問經奉持中有二初天帝問持二如來正答言時天帝至云何奉持者述曰此經問名請奉持法也於如來正答中有二初讚法深妙如見極離二今當下前略為說前中有二初歎經非二乘境二歎經微妙言佛告至知見者述曰歎非境界也言憍尸迦至大功德聚者述曰歎妙也於如來為說中有三初如來敕聽二天帝等受教三正為說言今當至念之者述曰第一敕諸許說也言時天帝至受教者述曰第二顯受言佛言至師子吼如是受持者述曰第三正說正答答中有二初句答前名後句答前持也於別付天帝中有三初歎經深二正付屬三奉尊教言復次至入一二乘道者述曰歎深也言憍尸迦至廣分別說者述曰第二正付也言帝釋至頂受尊教者述曰第三遵教言時天帝至歎奉行者述曰第三依行分也其中真草未定規矩如有人寫者好用心力仰於感享歲影從法師首尾中間曾無暫捨謹於界部寶國伽藍令自春初聽勝鬘經及二十論隨所採撮咨聽未聞既受指麾編為述記但文約義廣披閲稍難又於儀鳳二年夏洛都東太原寺重更普搆舒文展義疏缺更㬲廣引文證庶後學者願莫焉義令記也
